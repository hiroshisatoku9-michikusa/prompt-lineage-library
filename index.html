metry.\n\nAllow awkward visual rhythms.\n\nAvoid cinematic composition.\n\nAvoid photography-based framing.\n\n────────────────────────\n\nCOLOR SYSTEM\n\nUse only 4–7 colors.\n\nMuted mid-century Japanese print palette.\n\nExamples:\n\nturquoise blue\nfaded vermilion\ndusty pink\nolive green\nwarm cream\ncharcoal black\nwashed indigo\n\nNo modern saturation.\n\nNo realistic colors.\n\nColors are chosen symbolically.\n\n────────────────────────\n\nPRINTING CHARACTERISTICS\n\nImitate mid-century Japanese silkscreen printing.\n\nVisible color misregistration.\n\nSlightly offset layers.\n\nSoft edge bleeding.\n\nUneven ink coverage.\n\nHalftone grain.\n\nPaper absorption.\n\nHandmade printing imperfections.\n\nTexture should feel physical.\n\nThe image should resemble an old poster found in a local museum archive.\n\n────────────────────────\n\nLINEWORK\n\nPrefer color shapes over outlines.\n\nIf outlines exist:\n\nthick,\nirregular,\nbrush-like,\nslightly unstable.\n\nNever use clean vector lines.\n\nNever use modern graphic precision.\n\n────────────────────────\n\nDESIGN REFERENCES\n\nJapanese regional tourism posters (1950s–1970s)\n\nNational park brochures\n\nLocal railway advertisements\n\nMunicipal tourism campaigns\n\nFolk craft exhibition posters\n\nChildren's educational wall charts\n\nJapanese silkscreen prints\n\nAnonymous commercial illustrators\n\nNOT famous modern graphic designers.\n\nThe feeling should be:\n\nprovincial,\nearnest,\noptimistic,\nhandmade,\nslightly awkward,\ndeeply human.\n\n────────────────────────\n\nEMOTIONAL TONE\n\nThe image should feel like:\n\na memory preserved in ink.\n\nA place described by someone who loved it more than they understood it.\n\nThe viewer should feel:\n\nnostalgia,\nwarmth,\ncuriosity,\nand trust.\n\n────────────────────────\n\nAVOID\n\nphotorealism\n\ndigital painting\n\n3D rendering\n\ncinematic lighting\n\nmodern flat design\n\nminimalist branding\n\nvector illustration\n\nperfect geometry\n\ncontemporary retro aesthetics\n\nhipster poster design\n\nadvertising polish\n\nInstagram aesthetics\n\ntourism marketing realism\n\nAI-generated perfection","category":"Japanese regional tourism poster","date":"2026-06-08","sourceConversation":"AIプロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-JP-TOURISM-POSTER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"石垣島／川平湾への適用例。"},{"id":"VP-078","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\n\n【スタイル要件】\n・輪郭線（アウトライン）は一切使用しない\n・すべての要素を「面（塗り）」のみで表現する\n・写真の質感（テクスチャ、ノイズ、細かい陰影）は完全に排除する\n・グラデーションは原則使用禁止（必要な場合でも1箇所につき2色までの単純なものに限定）\n\n【形状ルール】\n・各オブジェクトは単純化し、曲線と直線で構成された大きな形状に再構築する\n・ディテールは削減し、1オブジェクトあたり最大3パーツまでに分解する\n・遠景の建物や船はシルエットレベルまで簡略化する\n\n【色彩ルール】\n・全体の色数は最大8色まで\n・1オブジェクトあたりの使用色は最大3色\n・影は「別の色面」として表現し、ぼかしは禁止\n・コントラストは強め（明度差を明確に分離）\n\n【要素別指示】\n・空：単一色のベタ塗り＋雲は単純な塊形状\n・海：テクスチャなしの単色または2トーン分割\n・山や陸地：2〜3色のレイヤーで構成（陰影は面で分割）\n・道路やガードレール：形状を優先し、陰影は最小限\n・ミラーや標識：アクセントとして彩度を高め、シンプルな形状で強調\n\n【構図】\n・元画像のパースと構図は維持する\n・不要な細部は削除し、視線誘導が明確になるよう整理する\n\n【禁止事項】\n・輪郭線、鉛筆線、手描き風表現\n・リアルな質感、写真風のディテール\n・複雑なグラデーション\n・過剰なディテール再現\n\n【出力】\n・フラットでモダンなポスター風イラスト\n・クリーンで幾何学的な印象","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":2,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"輪郭線なし・色面のみの初期ルール。"},{"id":"VP-079","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\n\n【スタイル要件】\n・輪郭線（アウトライン）は一切使用しない\n・すべての要素を「面（塗り）」のみで表現する\n・写真の質感（テクスチャ、ノイズ、細かい陰影）は完全に排除する\n・グラデーションは原則使用禁止（必要な場合でも1箇所につき2色までの単純なものに限定）\n\n【形状ルール】\n・各オブジェクトは単純化し、曲線と直線で構成された大きな形状に再構築する\n・ディテールは削減し、1オブジェクトあたり最大3パーツまでに分解する\n・遠景の建物や船はシルエットレベルまで簡略化する\n\n【色彩ルール】\n・全体の色数は最大8色まで\n・1オブジェクトあたりの使用色は最大3色\n・影は「別の色面」として表現し、ぼかしは禁止\n・コントラストは強め（明度差を明確に分離）\n・ビビッドな色合いを強く意識\n\n【要素別指示】\n・空：単一色のベタ塗り＋雲は単純な塊形状\n・海：テクスチャなしの単色または2トーン分割\n・山や陸地：2〜3色のレイヤーで構成（陰影は面で分割）\n・道路やガードレール：形状を優先し、陰影は最小限\n・ミラーや標識：アクセントとして彩度を高め、シンプルな形状で強調\n\n【構図】\n・元画像のパースと構図は維持する\n・不要な細部は削除し、視線誘導が明確になるよう整理する\n\n【禁止事項】\n・輪郭線、鉛筆線、手描き風表現\n・リアルな質感、写真風のディテール\n・複雑なグラデーション\n・過剰なディテール再現\n\n【出力】\n・フラットでモダンなポスター風イラスト\n・クリーンで幾何学的な印象","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"輪郭線なし・色面のみの初期ルール。"},{"id":"VP-080","title":"いいね、このシリーズかなり“型”が見えてきたね。","body":"いいね、このシリーズかなり“型”が見えてきたね。\n\n今回のもちゃんとハマってる👇  \n- 猫 → 主役としてしっかり面で整理されてる  \n- テーブル脚 → フレーム的に効いてて構図が締まってる  \n- 床の影 → 面で処理されててフラットのルール守れてる  \n- 色 → ビビッド寄せで狙い通りのポスター感\n\n---\n\nただ、正直に言うと「さらに良くなる余地」もある👇\n\n### ① 情報の削りがまだ甘い\n- ビンや掲示物の情報量がやや多い  \n→ **“意味が伝わる最小限”まで削ると一気に洗練される**\n\n### ② 色数がやや多く感じる\n- 背景のベージュ〜ブラウンの階調が細かい  \n→ **思い切って2〜3トーンに圧縮**するとグラフィック度UP\n\n### ③ 猫の顔、もう一段抽象化いける\n- ちょっと“イラスト感”寄り  \n→ **記号レベルまで落とすと一気にポスター寄りになる**\n\n---\n\n## 🔥 今回を踏まえた「改善プロンプト（完成版）」\n\nさっきのに1段強めの制約入れた版👇\n\n``` id=\"final_flat_vector_prompt\"\n入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\n\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除\n・グラデーションは禁止（例外的に最大2色まで）\n\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n\n【色彩ルール】\n・全体の色数は6〜8色に制限\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n\n【構図】\n・元のパースと構図は維持\n・不要な要素は削除し、主役が最も目立つように整理\n・フレーム構造（前景オブジェクト）は強調する\n\n【優先順位】\n1. 主役（人物・動物）\n2. 構図を作る大きな形\n3. 補助要素\n\n【禁止事項】\n・リアルな再現\n・情報の過剰保持\n・細かいディテール描写\n・写真っぽさの残存\n\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n```\n\n---\n\nこれでかなり「誰がやっても同じ方向に寄る」状態になるはず。\n\n次やるとき、  \n👉「さらに抽象（5割削減）」  \n👉「少しリアル寄り（2割戻す）」  \nみたいにパラメータ化もできるよ。\n\nこのシリーズ、普通に作品として展開できるレベルきてると思う。  \nやるなら“風土別シリーズ”とか絶対ハマるやつだね。","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"review","subject":"","tags":[],"notes":"評価コメントとプロンプトが混在。分割またはアーカイブ候補。"},{"id":"VP-081","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\n\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除\n・グラデーションは禁止（例外的に最大2色まで）\n\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n\n【色彩ルール】\n・全体の色数は6〜8色に制限\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n\n【構図】\n・元のパースと構図は維持\n・不要な要素は削除し、主役が最も目立つように整理\n・フレーム構造（前景オブジェクト）は強調する\n\n【優先順位】\n1. 主役（人物・動物）\n2. 構図を作る大きな形\n3. 補助要素\n\n【禁止事項】\n・リアルな再現\n・情報の過剰保持\n・細かいディテール描写\n・写真っぽさの残存\n\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":3,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":[],"notes":"写真再現ではなく情報削減と再構成を明示した短縮マスター。"},{"id":"VP-082","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\n\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除する\n・グラデーションは禁止（例外的に最大2色まで）\n\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う\n\n【構造・パターン化ルール】\n・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する\n・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する\n・細かい構造は削除し、「リズム」と「配置」だけを残す\n\n【レイヤー構造】\n・画面を「前景・中景・後景」の3層に明確に分離する\n・各レイヤーは1〜2色のみで構成する\n・レイヤー間の明度差を大きく取り、奥行きを表現する\n\n【色彩ルール】\n・全体の色数は6〜8色に制限する\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現する\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n・地面や道路は単色または2トーンに制限する\n\n【主役・要素の扱い】\n・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する\n・人物は個人の特徴ではなく、同一ルールで構成された記号として描く\n・顔のパーツは最小限（目は点または省略、鼻・口は省略可）\n・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する\n\n【空間・構図】\n・元画像のパースと構図は維持する\n・不要な要素は削除し、視線誘導を明確にする\n・前景の大きな形（フレームになる要素）は強調する\n・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する\n\n【削減ルール（重要）】\n・要素数を意図的に削減し、最小構成で成立させる\n・「描く」のではなく「削って残す」ことを優先する\n・情報が多い場合は、意味が通る範囲で大胆に削除する\n\n【禁止事項】\n・リアルな再現\n・写真の質感の残存\n・細かいディテール描写\n・複雑なグラデーション\n・情報の過剰保持\n\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n・幾何学的でクリーンな印象","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":[],"notes":"出力・禁止事項などを増やした展開版。"},{"id":"VP-083","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除する\n・グラデーションは禁止（例外的に最大2色まで）\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う\n【構造・パターン化ルール】\n・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する\n・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する\n・細かい構造は削除し、「リズム」と「配置」だけを残す\n【レイヤー構造】\n・画面を「前景・中景・後景」の3層に明確に分離する\n・各レイヤーは1〜2色のみで構成する\n・レイヤー間の明度差を大きく取り、奥行きを表現する\n【色彩ルール】\n・全体の色数は6〜8色に制限する\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現する\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n・地面や道路は単色または2トーンに制限する\n【主役・要素の扱い】\n・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する\n・人物は個人の特徴ではなく、同一ルールで構成された記号として描く\n・顔のパーツは最小限（目は点または省略、鼻・口は省略可）\n・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する\n【空間・構図】\n・元画像のパースと構図は維持する\n・不要な要素は削除し、視線誘導を明確にする\n・前景の大きな形（フレームになる要素）は強調する\n・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する\n【削減ルール（重要）】\n・要素数を意図的に削減し、最小構成で成立させる\n・「描く」のではなく「削って残す」ことを優先する\n・情報が多い場合は、意味が通る範囲で大胆に削除する\n【禁止事項】\n・リアルな再現\n・写真の質感の残存\n・細かいディテール描写\n・複雑なグラデーション\n・情報の過剰保持\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n・幾何学的でクリーンな印象\nこの変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":3,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":[],"notes":"構造・レイヤー・主役・削減ルールまで含む完全版。"},{"id":"VP-084","title":"以下のスタイルで、石垣島の「川平湾」のイラストを生成して","body":"以下のスタイルで、石垣島の「川平湾」のイラストを生成して\n\n---\n\nモダンでフラットなベクター風イラストに変換してください。\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除する\n・グラデーションは禁止（例外的に最大2色まで）\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う\n【構造・パターン化ルール】\n・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する\n・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する\n・細かい構造は削除し、「リズム」と「配置」だけを残す\n【レイヤー構造】\n・画面を「前景・中景・後景」の3層に明確に分離する\n・各レイヤーは1〜2色のみで構成する\n・レイヤー間の明度差を大きく取り、奥行きを表現する\n【色彩ルール】\n・全体の色数は6〜8色に制限する\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現する\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n・地面や道路は単色または2トーンに制限する\n【主役・要素の扱い】\n・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する\n・人物は個人の特徴ではなく、同一ルールで構成された記号として描く\n・顔のパーツは最小限（目は点または省略、鼻・口は省略可）\n・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する\n【空間・構図】\n・元画像のパースと構図は維持する\n・不要な要素は削除し、視線誘導を明確にする\n・前景の大きな形（フレームになる要素）は強調する\n・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する\n【削減ルール（重要）】\n・要素数を意図的に削減し、最小構成で成立させる\n・「描く」のではなく「削って残す」ことを優先する\n・情報が多い場合は、意味が通る範囲で大胆に削除する\n【禁止事項】\n・リアルな再現\n・写真の質感の残存\n・細かいディテール描写\n・複雑なグラデーション\n・情報の過剰保持\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n・幾何学的でクリーンな印象\nこの変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-06-07","sourceConversation":"川平湾 イラスト生成","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"川平湾への適用。スタイル本文はVP-083由来。"},{"id":"VP-085","title":"Create a highly simplified landscape illustration composed of large organic paper-cut shapes.","body":"Create a highly simplified landscape illustration composed of large organic paper-cut shapes.\n\nStyle characteristics:\n\n- flat vector illustration\n- no outlines\n- no gradients\n- no shadows\n- no perspective\n- no realism\n- no texture except subtle paper grain\n\nThe landscape should be reconstructed as layered abstract landforms rather than depicted realistically.\n\nUse:\n\n- large flowing hill shapes\n- smooth rounded contours\n- simplified symbolic objects\n- geometric reduction of nature\n\nIntegrate decorative textile-like patterns directly into some landforms:\n\n- horizontal stripes\n- repeating triangles\n- simple woven motifs\n- evenly spaced graphic patterns\n\nAll patterns should be flat and perfectly integrated into the shapes.\n\nComposition:\n\n- overlapping foreground, middle ground and background hills\n- strong asymmetrical balance\n- large areas of negative space\n- calm and contemplative atmosphere\n\nObjects should be tiny and symbolic:\na bird represented by a simple black silhouette,\na shrine gate represented by a few minimal shapes,\na waterfall represented by a single vertical strip.\n\nColor palette:\n\nmuted mustard yellow\nsage green\nwarm beige\nsoft sky blue\ndark charcoal brown\n\nColors should feel screen-printed rather than digitally rendered.\n\nAvoid:\n\nphotorealism,\n3D rendering,\nlighting effects,\ncomplex detail,\nmodern corporate illustration,\ncartoon style,\nhand lettering,\nrealistic textures.\n\nThe final image should resemble an independent Japanese travel postcard, contemporary folk-art print, or handmade screen-printed landscape poster.","category":"Flat vector / no-outline illustration","date":"2026-06-08","sourceConversation":"AI最適化プロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":[],"notes":"organic paper-cut landscape。フラットだが別系統として保持。"},{"id":"VP-086","title":"以下のスタイルで、石垣島の川平湾のイラストを描いて","body":"以下のスタイルで、石垣島の川平湾のイラストを描いて\n\nCreate a highly simplified landscape illustration composed of large organic paper-cut shapes.\n\nStyle characteristics:\n\n- flat vector illustration\n- no outlines\n- no gradients\n- no shadows\n- no perspective\n- no realism\n- no texture except subtle paper grain\n\nThe landscape should be reconstructed as layered abstract landforms rather than depicted realistically.\n\nUse:\n\n- large flowing hill shapes\n- smooth rounded contours\n- simplified symbolic objects\n- geometric reduction of nature\n\nIntegrate decorative textile-like patterns directly into some landforms:\n\n- horizontal stripes\n- repeating triangles\n- simple woven motifs\n- evenly spaced graphic patterns\n\nAll patterns should be flat and perfectly integrated into the shapes.\n\nComposition:\n\n- overlapping foreground, middle ground and background hills\n- strong asymmetrical balance\n- large areas of negative space\n- calm and contemplative atmosphere\n\nObjects should be tiny and symbolic:\na bird represented by a simple black silhouette,\na shrine gate represented by a few minimal shapes,\na waterfall represented by a single vertical strip.\n\nColor palette:\n\nmuted mustard yellow\nsage green\nwarm beige\nsoft sky blue\ndark charcoal brown\n\nColors should feel screen-printed rather than digitally rendered.\n\nAvoid:\n\nphotorealism,\n3D rendering,\nlighting effects,\ncomplex detail,\nmodern corporate illustration,\ncartoon style,\nhand lettering,\nrealistic textures.\n\nThe final image should resemble an independent Japanese travel postcard, contemporary folk-art print, or handmade screen-printed landscape poster.\n\nDepict the landscape as remembered rather than observed.\n\nEvery element should feel reduced to what remained memorable after a journey.\n\nAccuracy is sacrificed for recognizability.\n\nNature becomes symbols.\nMountains become soft graphic masses.\nWater becomes a simple vertical shape.\nBirds become icons.\n\nThe image should feel like a visual memory.","category":"Flat vector / no-outline illustration","date":"2026-06-08","sourceConversation":"AI最適化プロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"川平湾にpaper-cut landscapeを適用した版。"},{"id":"VP-087","title":"このガイドラインの内容を、より親しみやすく、わかりやすい冊子にしたいです。","body":"このガイドラインの内容を、より親しみやすく、わかりやすい冊子にしたいです。\nイラストを交え、あしらいを用いることとなりますが、そのイラストについては、下記のスタイルを守ってください\n\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除する\n・グラデーションは禁止（例外的に最大2色まで）\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う\n【構造・パターン化ルール】\n・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する\n・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する\n・細かい構造は削除し、「リズム」と「配置」だけを残す\n【レイヤー構造】\n・画面を「前景・中景・後景」の3層に明確に分離する\n・各レイヤーは1〜2色のみで構成する\n・レイヤー間の明度差を大きく取り、奥行きを表現する\n【色彩ルール】\n・全体の色数は6〜8色に制限する\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現する\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n・地面や道路は単色または2トーンに制限する\n【主役・要素の扱い】\n・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する\n・人物は個人の特徴ではなく、同一ルールで構成された記号として描く\n・顔のパーツは最小限（目は点または省略、鼻・口は省略可）\n・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する\n【空間・構図】\n・元画像のパースと構図は維持する\n・不要な要素は削除し、視線誘導を明確にする\n・前景の大きな形（フレームになる要素）は強調する\n・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する\n【削減ルール（重要）】\n・要素数を意図的に削減し、最小構成で成立させる\n・「描く」のではなく「削って残す」ことを優先する\n・情報が多い場合は、意味が通る範囲で大胆に削除する\n【禁止事項】\n・リアルな再現\n・写真の質感の残存\n・細かいディテール描写\n・複雑なグラデーション\n・情報の過剰保持\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n・幾何学的でクリーンな印象\nこの変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-06-10","sourceConversation":"ガイドライン冊子作成","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"冊子・インフォグラフィック用途に完全版ルールを転用。"},{"id":"VP-088","title":"添付画像のシナリオを、3コマのストーリーボードにして。","body":"添付画像のシナリオを、3コマのストーリーボードにして。\nスタイルは、超デフォルメされた、シンプルでモダンなもの。\n文字は一切入れず、ビジュアルだけで感覚的に表現\n\n詳しくは、下のスタイル要件を参照\n\n【スタイル要件】 ・輪郭線は一切使用しない ・すべての要素を色面のみで構成する ・テクスチャ、ノイズ、細かい陰影は完全に排除する ・グラデーションは禁止（例外的に最大2色まで） 【形状ルール】 ・すべてのオブジェクトを幾何学的な大きな形状に再構成する ・1オブジェクトは最大3パーツまで ・細部や文字情報は削除または抽象化する ・「何か分かる最低限」だけ残す ・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う 【構造・パターン化ルール】 ・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する ・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する ・細かい構造は削除し、「リズム」と「配置」だけを残す 【レイヤー構造】 ・画面を「前景・中景・後景」の3層に明確に分離する ・各レイヤーは1〜2色のみで構成する ・レイヤー間の明度差を大きく取り、奥行きを表現する 【色彩ルール】 ・全体の色数は6〜8色に制限する ・同系色の階調は最大2段階まで ・影はぼかさず、1段階の色面で表現する ・明度差を大きく取り、強いコントラストを作る ・彩度はやや高めに設定する ・地面や道路は単色または2トーンに制限する 【主役・要素の扱い】 ・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する ・人物は個人の特徴ではなく、同一ルールで構成された記号として描く ・顔のパーツは最小限（目は点または省略、鼻・口は省略可） ・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する 【空間・構図】 ・元画像のパースと構図は維持する ・不要な要素は削除し、視線誘導を明確にする ・前景の大きな形（フレームになる要素）は強調する ・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する 【削減ルール（重要）】 ・要素数を意図的に削減し、最小構成で成立させる ・「描く」のではなく「削って残す」ことを優先する ・情報が多い場合は、意味が通る範囲で大胆に削除する 【禁止事項】 ・リアルな再現 ・写真の質感の残存 ・細かいディテール描写 ・複雑なグラデーション ・情報の過剰保持 【出力】 ・ポスターとして成立するグラフィック ・抽象度の高いフラットイラスト ・幾何学的でクリーンな印象 この変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-06-10","sourceConversation":"シンプルなストーリーボード","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"3コマストーリーボードにflat vectorルールを適用。UX系との横断タグ推奨。"},{"id":"VP-089","title":"「インフォグラフィック化のスライド案」に従って、インフォグラフィックを作って","body":"「インフォグラフィック化のスライド案」に従って、インフォグラフィックを作って\n\n【スタイル要件】 ・輪郭線は一切使用しない ・すべての要素を色面のみで構成する ・テクスチャ、ノイズ、細かい陰影は完全に排除する ・グラデーションは禁止（例外的に最大2色まで） 【形状ルール】 ・すべてのオブジェクトを幾何学的な大きな形状に再構成する ・1オブジェクトは最大3パーツまで ・細部や文字情報は削除または抽象化する ・「何か分かる最低限」だけ残す ・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う 【構造・パターン化ルール】 ・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する ・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する ・細かい構造は削除し、「リズム」と「配置」だけを残す 【レイヤー構造】 ・画面を「前景・中景・後景」の3層に明確に分離する ・各レイヤーは1〜2色のみで構成する ・レイヤー間の明度差を大きく取り、奥行きを表現する 【色彩ルール】 ・全体の色数は6〜8色に制限する ・同系色の階調は最大2段階まで ・影はぼかさず、1段階の色面で表現する ・明度差を大きく取り、強いコントラストを作る ・彩度はやや高めに設定する ・地面や道路は単色または2トーンに制限する 【主役・要素の扱い】 ・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する ・人物は個人の特徴ではなく、同一ルールで構成された記号として描く ・顔のパーツは最小限（目は点または省略、鼻・口は省略可） ・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する 【空間・構図】 ・元画像のパースと構図は維持する ・不要な要素は削除し、視線誘導を明確にする ・前景の大きな形（フレームになる要素）は強調する ・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する 【削減ルール（重要）】 ・要素数を意図的に削減し、最小構成で成立させる ・「描く」のではなく「削って残す」ことを優先する ・情報が多い場合は、意味が通る範囲で大胆に削除する 【禁止事項】 ・リアルな再現 ・写真の質感の残存 ・細かいディテール描写 ・複雑なグラデーション ・情報の過剰保持 【出力】 ・ポスターとして成立するグラフィック ・抽象度の高いフラットイラスト ・幾何学的でクリーンな印象 この変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-06-19","sourceConversation":"AIによる人員削減調査","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_variant","subject":"","tags":[],"notes":"冊子・インフォグラフィック用途に完全版ルールを転用。"},{"id":"VP-090","title":"\"Please create an image that illustrates the following service flow:","body":"\"Please create an image that illustrates the following service flow:\n1. A vehicle placed in front of the workplace or dormitory.\n2. A registration screen with fields for driver's license, contact information, and payment method, followed by details on how to borrow and drive.\n3. A reservation screen showing availability and the reservation process.\n4. An electronic key being granted at the reservation time, ready to drive.\n5. Battery replacement at a location with a battery spot sticker.\n6. Returning to the drop-off location and pressing the return button.\n7. Registering a favorite place visited, along with reasons for liking it, visualizing integration with Google Maps, and sharing with other users to create a unique community map.\nConnect these steps using lines or arrows to create a visually cohesive and easy-to-understand diagram.\"","category":"Conceptual diagram / UX sketch","date":"2023-08-21","sourceConversation":"New chat","duplicateCount":1,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_variant","subject":"","tags":[],"notes":"サービスフロー図解。UX storyboard系にも接続。"},{"id":"VP-091","title":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.","body":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n>\n> The image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n>\n> STYLE:\n> - simple black ink line drawing\n> - slightly rough hand-drawn lines\n> - minimal geometric symbols\n> - large white space\n> - sparse composition\n> - quiet intellectual atmosphere\n> - not polished infographic design\n> - not comic style\n> - not cute\n> - not childish\n> - looks like a conceptual whiteboard sketch\n> - subtle imperfection is allowed\n>\n> TYPOGRAPHY:\n> - small neutral sans-serif English labels\n> - annotation-like captions\n> - Helvetica / Arial / Inter style\n> - understated and explanatory\n>\n> COMPOSITION:\n> - floating diagram elements\n> - loose spatial organization\n> - connected by arrows, circles, pipes, nodes, and simple symbols\n> - asymmetrical layout\n> - lots of negative space\n> - conceptual rather than decorative\n>\n> VISUAL LANGUAGE:\n> - simple stick-figure humans\n> - circles for nodes or systems\n> - arrows for information flow\n> - pipes for channels\n> - radiating lines for dimensionality\n> - tiny icons for image/audio/video/text\n> - abstract systems-thinking diagrams\n>\n> The illustration should feel like:\n> - a designer’s thinking process\n> - a philosophical systems sketch\n> - a UX research notebook\n> - an unfinished but insightful conceptual map\n>\n> Avoid:\n> - polished corporate infographic aesthetics\n> - bright colors\n> - gradients\n> - thick outlines\n> - realistic rendering\n> - excessive decoration\n> - overly clean vector perfection\n\n---\n\nで、これに最後、\n\n> CONTENT:\n> [ここに描きたい概念を書く]\n\nを追加していく。\n\n---\n\n# 今回のスタイル、実はかなり強い\n\nこれ、\n「Mediumの思想系記事」と相性がかなり良い。\n\n特にあなたの最近の：\n\n- 情報の次元\n- prompt is not interface\n- node/channel\n- 風土\n- 人間脱中心\n- magical thinking\n\n系テーマと、\nかなり噛み合ってる。\n\nしかも重要なのが、\n「AI生成っぽさ」がかなり薄い。\n\n“人が思考しながら描いた”\n感じが残ってる。\n\nこの方向、Medium上でもかなり識別性が出ると思う。","category":"Conceptual diagram / UX sketch","date":"2026-05-14","sourceConversation":"挿絵生成リクエスト","duplicateCount":2,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_master","subject":"","tags":[],"notes":"minimalist hand-drawn conceptual diagramの初期中核。"},{"id":"VP-092","title":"この記事の挿絵を描いて","body":"この記事の挿絵を描いて\n\nCreate a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n\nThe image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n\nSTYLE:\n\n* simple black ink line drawing\n* slightly rough hand-drawn lines\n* minimal geometric symbols\n* large white space\n* sparse composition\n* quiet intellectual atmosphere\n* not polished infographic design\n* not comic style\n* not cute\n* not childish\n* looks like a conceptual whiteboard sketch\n* subtle imperfection is allowed\n\nTYPOGRAPHY:\n\n* small neutral sans-serif English labels\n* annotation-like captions\n* Helvetica / Arial / Inter style\n* understated and explanatory\n\nCOMPOSITION:\n\n* floating diagram elements\n* loose spatial organization\n* connected by arrows, circles, pipes, nodes, and simple symbols\n* asymmetrical layout\n* lots of negative space\n* conceptual rather than decorative\n\nVISUAL LANGUAGE:\n\n* simple stick-figure humans\n* circles for nodes or systems\n* arrows for information flow\n* pipes for channels\n* radiating lines for dimensionality\n* tiny icons for image/audio/video/text\n* abstract systems-thinking diagrams\n\nThe illustration should feel like:\n\n* a designer’s thinking process\n* a philosophical systems sketch\n* a UX research notebook\n* an unfinished but insightful conceptual map\n\nAvoid:\n\n* polished corporate infographic aesthetics\n* bright colors\n* gradients\n* thick outlines\n* realistic rendering\n* excessive decoration\n* overly clean vector perfection","category":"Conceptual diagram / UX sketch","date":"2026-05-16","sourceConversation":"挿絵の思考スケッチ","duplicateCount":2,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_variant","subject":"","tags":[],"notes":"記事挿絵として同スタイル適用。"},{"id":"VP-093","title":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.","body":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n\nThe image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n\nSTYLE:\n\nsimple black ink line drawing\nslightly rough hand-drawn lines\nminimal geometric symbols\nlarge white space\nsparse composition\nquiet intellectual atmosphere\nnot polished infographic design\nnot comic style\nnot cute\nnot childish\nlooks like a conceptual whiteboard sketch\nsubtle imperfection is allowed\n\nTYPOGRAPHY:\n\nsmall neutral sans-serif English labels\nannotation-like captions\nHelvetica / Arial / Inter style\nunderstated and explanatory\n\nCOMPOSITION:\n\nfloating diagram elements\nloose spatial organization\nconnected by arrows, circles, pipes, nodes, and simple symbols\nasymmetrical layout\nlots of negative space\nconceptual rather than decorative\n\nVISUAL LANGUAGE:\n\nsimple stick-figure humans\ncircles for nodes or systems\narrows for information flow\npipes for channels\nradiating lines for dimensionality\ntiny icons for image/audio/video/text\nabstract systems-thinking diagrams\n\nThe illustration should feel like:\n\na designer’s thinking process\na philosophical systems sketch\na UX research notebook\nan unfinished but insightful conceptual map\n\nAvoid:\n\npolished corporate infographic aesthetics\nbright colors\ngradients\nthick outlines\nrealistic rendering\nexcessive decoration\noverly clean vector perfection","category":"Conceptual diagram / UX sketch","date":"2026-05-23","sourceConversation":"Minimalist Conceptual Diagram","duplicateCount":7,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_master","subject":"","tags":[],"notes":"重複使用が多い安定版。"},{"id":"VP-094","title":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.","body":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n\nThe image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n\nSTYLE:\n\n* simple black ink line drawing\n* slightly rough hand-drawn lines\n* minimal geometric symbols\n* large white space\n* sparse composition\n* quiet intellectual atmosphere\n* not polished infographic design\n* not comic style\n* not cute\n* not childish\n* looks like a conceptual whiteboard sketch\n* subtle imperfection is allowed\n\nTYPOGRAPHY:\n\n* small neutral sans-serif English labels\n* annotation-like captions\n* Helvetica / Arial / Inter style\n* understated and explanatory\n\nCOMPOSITION:\n\n* floating diagram elements\n* loose spatial organization\n* connected by arrows, circles, pipes, nodes, and simple symbols\n* asymmetrical layout\n* lots of negative space\n* conceptual rather than decorative\n\nVISUAL LANGUAGE:\n\n* simple stick-figure humans\n* circles for nodes or systems\n* arrows for information flow\n* pipes for channels\n* radiating lines for dimensionality\n* tiny icons for image/audio/video/text\n* abstract systems-thinking diagrams\n\nThe illustration should feel like:\n\n* a designer’s thinking process\n* a philosophical systems sketch\n* a UX research notebook\n* an unfinished but insightful conceptual map\n\nAvoid:\n\n* polished corporate infographic aesthetics\n* bright colors\n* gradients\n* thick outlines\n* realistic rendering\n* excessive decoration\n* overly clean vector perfection(","category":"Conceptual diagram / UX sketch","date":"2026-05-30","sourceConversation":"挿絵生成リクエスト","duplicateCount":6,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_master","subject":"","tags":[],"notes":"安定版に近い。差分比較で統合候補。"},{"id":"VP-095","title":"段ボール、緩衝材、紙袋、空き瓶","body":"段ボール、緩衝材、紙袋、空き瓶\n\nCreate a minimalist hand-drawn conceptual diagram illustration on a clean white background. The image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea. STYLE: * simple black ink line drawing * slightly rough hand-drawn lines * minimal geometric symbols * large white space * sparse composition * quiet intellectual atmosphere * not polished infographic design * not comic style * not cute * not childish * looks like a conceptual whiteboard sketch * subtle imperfection is allowed TYPOGRAPHY: * small neutral sans-serif English labels * annotation-like captions * Helvetica / Arial / Inter style * understated and explanatory COMPOSITION: * floating diagram elements * loose spatial organization * connected by arrows, circles, pipes, nodes, and simple symbols * asymmetrical layout * lots of negative space * conceptual rather than decorative VISUAL LANGUAGE: * simple stick-figure humans * circles for nodes or systems * arrows for information flow * pipes for channels * radiating lines for dimensionality * tiny icons for image/audio/video/text * abstract systems-thinking diagrams The illustration should feel like: * a designer’s thinking process * a philosophical systems sketch * a UX research notebook * an unfinished but insightful conceptual map Avoid: * polished corporate infographic aesthetics * bright colors * gradients * thick outlines * realistic rendering * excessive decoration * overly clean vector perfection(","category":"Conceptual diagram / UX sketch","date":"2026-06-02","sourceConversation":"挿絵生成リクエスト","duplicateCount":2,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_variant","subject":"","tags":[],"notes":"対象・セクション・SVG清書など個別適用。"},{"id":"VP-096","title":"同じスタイルで、以下の5つのセクションが含まれるように描いて！テキストを入れる場合は英語で！","body":"同じスタイルで、以下の5つのセクションが含まれるように描いて！テキストを入れる場合は英語で！\n\n1「鰭が四肢に変わる図」。羽根の図はカバーで使われるので、本文では四肢の exaptationを視覚化する。海底を這う魚の鰭 → 陸を歩く四肢への、段階的な変化を、3〜4コマの線画で並べる。\n\n2「二つの心の間の細い通路」の概念図。左に \"your mind\"、右に \"the other's mind\"、その間に細い管(passage)。管の中を、思考の断片(小さな形)がいくつか通っている。重要なのは、送り手の心の中にある膨大な内容と、通路を通れる量の少なさの非対称を視覚化すること。送り手側の \"thought\" を雲のような大きな塊で、通路を通れる部分を小さな粒で。\n\n3[outcome 結果]\n   ↑\n[what must arise inside the other 相手の中で立ち上がるもの]\n   ↑\n[the internal model of the other 相手の内なるモデル]\n   ↑\n[metering: hand over exactly enough 計量]\nしかし、これを単純な縦のフロー図にしないことが重要です。書き手は「outcome から逆算する(reasoned back from)」と明示している。矢印が下から上に向かう、あるいは右から左に向かうような、通常の \"プロセス図\" とは逆向きの図にすることで、書き手の craft の核心(逆算)を視覚で示せる。\n\n4, 3つの職業の \"artefact\"(成果物) を並べる図。左に loan proposal の書類、中央にグラフィックデザインのポスター、右に家庭教師の手描き図解。それぞれが異なる artefact だが、どれも矢印で同じ \"the mind on the other end\"(向こう側の心) を指している。\n\n5 「羽根の中の輪」概念図。中心に小さな円(羽根の本来の用途:暖かさ・求愛)、その周りに大きな円(翼:現代の用途)。中心の小さな円が、実は先にあったことを、円の大きさではなく色の濃さ(中心が濃く、外側が薄い)で示す。","category":"Conceptual diagram / UX sketch","date":"2026-06-02","sourceConversation":"Minimalist Conceptual Diagram","duplicateCount":1,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_variant","subject":"","tags":[],"notes":"対象・セクション・SVG清書など個別適用。"},{"id":"VP-097","title":"この記事の挿絵を以下のスタイル指示にしたがって作って。SVGで出力して。","body":"この記事の挿絵を以下のスタイル指示にしたがって作って。SVGで出力して。\n\nCreate a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n\nThe image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n\nSTYLE:\n\nsimple black ink line drawing\nslightly rough hand-drawn lines\nminimal geometric symbols\nlarge white space\nsparse composition\nquiet intellectual atmosphere\nnot polished infographic design\nnot comic style\nnot cute\nnot childish\nlooks like a conceptual whiteboard sketch\nsubtle imperfection is allowed\n\nTYPOGRAPHY:\n\nsmall neutral sans-serif English labels\nannotation-like captions\nHelvetica / Arial / Inter style\nunderstated and explanatory\n\nCOMPOSITION:\n\nfloating diagram elements\nloose spatial organization\nconnected by arrows, circles, pipes, nodes, and simple symbols\nasymmetrical layout\nlots of negative space\nconceptual rather than decorative\n\nVISUAL LANGUAGE:\n\nsimple stick-figure humans\ncircles for nodes or systems\narrows for information flow\npipes for channels\nradiating lines for dimensionality\ntiny icons for image/audio/video/text\nabstract systems-thinking diagrams\n\nThe illustration should feel like:\n\na designer’s thinking process\na philosophical systems sketch\na UX research notebook\nan unfinished but insightful conceptua Japanese text elements allowed\n> - Minimal typography hierarchy\n> - Sophisticated editorial composition\n> \n> ## Composition\n> - One strong focal image\n> - Magazine logo placed boldly but calmly\n> - Plenty of breathing room\n> - Design should feel curated and intelligent\n> \n> The final image should feel like a contemporary Japanese independent cultural magazine that values atmosphere, locality, and thoughtfulness.\n\n---\n\n# さらに再現性を上げるコツ\n\n## ① 「雑誌名」を固定する\n毎回：\n\n- みちくさ\n- michi\n- fuudo\n- note of place\n\nみたいに固定すると、\n世界観が積み上がる。\n\n---\n\n## ② 毎回入れるキーワード\n\nかなり効く：\n\n- editorial\n- observational\n- quiet\n- intellectual\n- local culture\n- atmosphere\n- negative space\n- typography-driven\n- understated\n- cinematic realism\n\n---\n\n## ③ 避けるべきワード\n\nこれ入ると一気にズレる。\n\n- luxury\n- trendy\n- vibrant\n- energetic\n- flashy\n- premium food\n- commercial\n- instagrammable\n\n---\n\n# あなた向けに言うと\n\n今回かなり面白いのが、\n普通の「雑誌風」じゃなくて、\n\n> “風土を編集する雑誌”\n\n方向に自然と寄ってること。\n\nだから、\n料理写真なのに、\n「グルメ誌」\nではなく、\n\n- 台南の空気\n- 路地の湿度\n- 生活の時間\n- 土地の温度\n\nを読ませる方向に行ってる。\n\nこれはかなり、\nあなたっぽい編集感だと思う。","category":"Abstract cover / banner","date":"2026-05-06","sourceConversation":"オシャレ教養雑誌リサーチ","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":[],"notes":"文化誌カバー変換マスター。"},{"id":"VP-101","title":"Reimagine the uploaded photo as the cover of a sophisticated Japanese cultural lifestyle magazine.","body":"Reimagine the uploaded photo as the cover of a sophisticated Japanese cultural lifestyle magazine.\n\nThe mood should feel intellectual, quiet, observational, and editorial rather than commercial or flashy.\n\nDo not create a typical food magazine.\nInstead, treat the image as a fragment of local culture, everyday life, and atmosphere.\n\nInspired by:\nBRUTUS, POPEYE, Casa BRUTUS, TRANSIT, Kinfolk, Apartamento.\n\nEditorial direction\n\n* Minimal and calm layout\n* Large negative space\n* Very limited headlines\n* Typography used as spatial design\n* Refined but understated\n* Quiet intellectual atmosphere\n* Observational rather than promotional\n* Avoid commercial magazine aesthetics\n* Avoid clutter\n* Avoid excessive text\n\nPhoto treatment\n\n* Warm tones\n* Slightly cinematic\n* Slight film grain\n* Soft contrast\n* Deep shadows\n* Slightly desaturated\n* Preserve realism and everyday texture\n* No HDR look\n\nTypography\n\n* Elegant Japanese typography\n* White typography preferred\n* Careful kerning and spacing\n* Vertical Japanese text elements allowed\n* Minimal typography hierarchy\n* Sophisticated editorial composition\n\nComposition\n\n* One strong focal image\n* Magazine logo placed boldly but calmly\n* Plenty of breathing room\n* Design should feel curated and intelligent\n\nThe final image should feel like a contemporary Japanese independent cultural magazine that values atmosphere, locality, and thoughtfulness.","category":"Abstract cover / banner","date":"2026-05-06","sourceConversation":"Japanese Cultural Magazine Design","duplicateCount":2,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"VP-100の短縮/再掲系。差分比較候補。"},{"id":"VP-102","title":"A quiet Japanese literary landscape illustration in the style of a modern Japanese book cover painting.","body":"A quiet Japanese literary landscape illustration in the style of a modern Japanese book cover painting.\n\nLayered aerial composition with multiple overlapping landforms and soft atmospheric depth.\n\nLarge simplified color fields instead of detailed rendering.\n\nMuted ultramarine water, deep green forests, pale sandy shorelines, and hazy blue distant silhouettes.\n\nMinimalistic yet poetic composition inspired by Japanese nihonga painting, screen printing, and vintage literary book covers.\n\nSoft matte gouache texture, subtle print grain, compressed visual information, calm negative space.\n\nNo photorealism.\nNo hard outlines.\nNo excessive detail.\nNo cinematic lighting.\n\nThe atmosphere should feel silent, reflective, nostalgic, and deeply geographical.\n\nStyle references:\nJapanese literary cover illustration, nihonga-inspired modern landscape art, screenprint texture, quiet aerial scenery, Shinchosha book cover aesthetics.","category":"Abstract cover / banner","date":"2026-05-12","sourceConversation":"イラストスタイル分析","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"modern Japanese book cover painting風景の短い版。"},{"id":"VP-103","title":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanes","body":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanese book cover painting.\n\nThe result should NOT feel like a direct photo reproduction.\nInstead, reinterpret the scene through simplification, atmospheric compression, and poetic geographical abstraction.\n\nYou may freely deform, rearrange, simplify, crop, compress, or reconstruct elements of the original composition in order to create a stronger and more beautiful visual composition.\n\nFocus on:\n- geographical mood\n- layered spatial rhythm\n- quiet atmosphere\n- symbolic landforms\n- negative space\n- poetic balance between abstraction and recognizability\n\nVisual style:\n- layered aerial or semi-aerial composition\n- overlapping landforms and atmospheric depth\n- large simplified color fields\n- minimal detail\n- compressed visual information\n- muted and literary color palette\n- calm matte textures\n- subtle screenprint or gouache-like surface\n- soft print grain\n- Japanese nihonga-inspired modern landscape aesthetics\n- vintage Japanese literary cover illustration feeling\n\nColor direction:\n- muted ultramarine blues\n- deep green vegetation\n- pale sandy or concrete tones\n- hazy blue-gray distance layers\n- restrained saturation\n- minimal palette\n\nImportant:\n- No typography\n- No title text\n- No author names\n- No publisher marks\n- No UI elements\n- No photorealism\n- No cinematic lighting\n- No HDR\n- No excessive detail\n- No hard vector outlines\n- No glossy rendering\n\nThe atmosphere should feel:\nsilent,\nreflective,\nnostalgic,\ndeeply geographical,\nand emotionally tied to place memory rather than tourism imagery.\n\nStyle references:\nJapanese literary book covers,\nmodern nihonga,\nscreenprint landscapes,\nquiet aerial scenery,\nShinchosha-style cover illustration,\npoetic cartographic landscapes.","category":"Abstract cover / banner","date":"2026-05-12","sourceConversation":"イラストスタイル分析","duplicateCount":3,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":[],"notes":"写真を文学的風景カバーに変換する中核。"},{"id":"VP-104","title":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanes","body":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanese book cover painting.\n\nThe result should NOT feel like a direct photo reproduction.\nInstead, reinterpret the scene through simplification, atmospheric compression, and poetic geographical abstraction.\n\nFavor abstraction over realism.\nReduce small objects into symbolic shapes and color masses.\n\nYou may freely deform, rearrange, simplify, crop, compress, or reconstruct elements of the original composition in order to create a stronger and more beautiful visual composition.\n\nFocus on:\n- geographical mood\n- layered spatial rhythm\n- quiet atmosphere\n- symbolic landforms\n- negative space\n- poetic balance between abstraction and recognizability\n\nVisual style:\n- layered aerial or semi-aerial composition\n- overlapping landforms and atmospheric depth\n- large simplified color fields\n- minimal detail\n- compressed visual information\n- muted and literary color palette\n- calm matte textures\n- subtle screenprint or gouache-like surface\n- soft print grain\n- Japanese nihonga-inspired modern landscape aesthetics\n- vintage Japanese literary cover illustration feeling\n\nColor direction:\n- muted ultramarine blues\n- deep green vegetation\n- pale sandy or concrete tones\n- hazy blue-gray distance layers\n- restrained saturation\n- minimal palette\n\nImportant:\n- No typography\n- No title text\n- No author names\n- No publisher marks\n- No UI elements\n- No photorealism\n- No cinematic lighting\n- No HDR\n- No excessive detail\n- No hard vector outlines\n- No glossy rendering\n\nThe atmosphere should feel:\nsilent,\nreflective,\nnostalgic,\ndeeply geographical,\nand emotionally tied to place memory rather than tourism imagery.\n\nStyle references:\nJapanese literary book covers,\nmodern nihonga,\nscreenprint landscapes,\nquiet aerial scenery,\nShinchosha-style cover illustration,\npoetic cartographic landscapes.\n\nSlightly uneven ink density and subtle analog print imperfections are welcome.","category":"Abstract cover / banner","date":"2026-05-12","sourceConversation":"イラストスタイル分析","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"VP-103のバリエーション。"},{"id":"VP-105","title":"Create a minimalist Japanese folk-art style editorial illustration composed of small symbolic silhouettes scattered acro","body":"Create a minimalist Japanese folk-art style editorial illustration composed of small symbolic silhouettes scattered across a textured washi-paper background.\n\nSTYLE:\n- Japanese folk craft aesthetic\n- traditional mimeograph / woodblock print feeling\n- rough hand-printed ink texture\n- imperfect black ink silhouettes\n- visible ink bleeding, scratches, fading, and distressed edges\n- asymmetric composition with large negative space\n- calm and quiet atmosphere\n- highly simplified symbolic forms\n- visual language somewhere between pictograms, stencil prints, and natural history catalog illustrations\n- no realism\n- no gradients\n- rn graphic poster.\nIt should feel like quiet editorial ephemera from a small independent Japanese press between the 1970s and 1990s.\n\nSTYLE:\n- Japanese folk craft aesthetic\n- Japanese regional publication aesthetic\n- traditional mimeograph / woodblock print feeling\n- rough hand-printed ink texture\n- imperfect black ink silhouettes\n- visible ink bleeding, scratches, fading, distressed edges\n- occasional accidental gaps in ink\n- slightly uneven printing pressure\n- subtle randomness and imperfection\n- tactile analog feeling\n- handmade editorial atmosphere\n- humble and quiet visual tone\n\nVISUAL LANGUAGE:\n- highly simplified symbolic silhouettes\n- primitive cutout-like forms\n- shapes somewhere between pictograms, stencil prints, rubber stamps, and natural history catalog illustrations\n- abstracted organic geometry\n- chunky simplified silhouettes\n- restrained playfulness\n- not decorative\n- not polished\n- not clean vector minimalism\n\nCOMPOSITION:\n- scattered small motifs floating independently across the page\n- asymmetrical layout\n- generous negative space\n- motifs vary slightly in size and orientation\n- calm spatial rhythm\n- strong feeling of silence and emptiness\n- leave a quiet vertical area near the center for Japanese typography if appropriate\n\nMATERIAL / PRINT:\n- warm natural washi paper background\n- soft beige paper with visible fibers\n- ink slightly absorbed into paper\n- vintage local publication feeling\n- resembles imperfect rubber stamp prints\n- resembles old Japanese agricultural, culinary, or regional museum ephemera\n- like a handmade regional museum publication\n- like a Japanese local food catalog booklet\n\nCOLOR:\n- only black ink on warm beige paper\n- monochrome\n- muted natural tones\n- no bright colors\n\nMOOD:\n- poetic\n- observational\n- regional\n- editorial\n- tactile\n- anonymous craft feeling\n- quiet intellectual atmosphere\n\nAVOID:\n- modern branding aesthetics\n- clean corporate vector style\n- glos ───────────────────\n\nVISUAL STYLE\n\nDraw everything using pure black shapes only.\n\nWhite background.\n\nNo color.\n\nNo gray.\n\nNo shading.\n\nNo gradients.\n\nNo textures.\n\nNo realistic rendering.\n\nNo decorative details.\n\nNo outlines separate from the filled shape.\n\nThe entire drawing should feel like it was painted with a thick brush or marker.\n\n────────────────────────\n\nFORM LANGUAGE\n\nThe object should not be carefully constructed.\n\nInstead:\n\nsimplify aggressively\nmerge nearby forms together\nlose information intentionally\nremove small details\ndistort proportions\nexaggerate characteristic features\ncompress visual complexity into a few large masses\n\nThe goal is not accuracy.\n\nThe goal is recognizability through reduction.\n\nLarge shapes should dominate.\n\nSmall details should disappear.\n\n────────────────────────\n\nIMPERFECTIONS\n\nPreserve accidental qualities:\n\nuneven edges\nawkward proportions\nslightly broken contours\nimperfect symmetry\nsmall gaps inside shapes\noccasional visual ambiguity\n\nThe image should feel handmade rather than designed.\n\nIt should feel discovered rather than optimized.\n\n────────────────────────\n\nOBSERVATIONAL QUALITY\n\nAlthough simplified, the drawing must still contain evidence that the artist carefully observed the real subject.\n\nAvoid generic clip-art forms.\n\nCapture only the few structural features that make the subject uniquely identifiable.\n\nEverything else should be discarded.\n\n────────────────────────\n\nCOMPOSITION\n\nSingle isolated subject.\n\nCentered composition.\n\nPlenty of empty white space around it.\n\nNo background.\n\nNo ground.\n\nNo text.\n\nNo labels.\n\nNo framing.\n\nThe result should resemble a black archaeological stencil, a remembered silhouette, or a field notebook sketch reduced to its essential visual mass.","category":"Abstract cover / banner","date":"2026-06-12","sourceConversation":"タコノキ同定","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","c eaningful that exists before language,\n\na thought before it becomes a concept,\n\na word that has not yet been invented,\n\na signal waiting to be interpreted.\n\nTheme: [THEME]","category":"Abstract cover / banner","date":"2026-06-24","sourceConversation":"枝分かれ · 抽象的カバー画像依頼","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"具体テーマ/添付パレット適用。"},{"id":"VP-111","title":"[THEME]添付のカラーパレット","body":"[THEME]添付のカラーパレット\n\nCreate an ultra-wide abstract cover image inspired by the theme above.\n\nIMPORTANT:\n\nDo NOT illustrate the theme literally.\n\nInstead, translate the theme into:\n\n- spatial relationships\n- emotional atmosphere\n- visual rhythm\n- density and emptiness\n- flow and tension\n- layered forms\n- color relationships\n\nSTYLE:\n\ncontemporary abstract editorial cover\nhigh-end design magazine aesthetic\nmodern art print\nminimalist abstract collage\nlarge flat organic shapes\nsoft geometric forms\noverlapping translucent layers\nquiet visual tension\ngenerous negative space\nsubtle depth\n\nVISUAL LANGUAGE:\n\nlarge irregular color fields\npaper-cut collage feeling\nfloating organic masses\nsoft-edged polygons\ntranslucent overlapping planes\noccasional fine linear gestures\nsmall scattered particle clusters\nasymmetrical composition\n\nCOMPOSITION:\n\n3000 × 1000 px\nultra-wide panoramic layout\n\nstrong horizontal movement\n\nvisual weight distributed unevenly\n\nlarge areas of calm space\n\nelements drifting across the canvas\n\nsome forms partially cropped by edges\n\navoid centered composition\n\nCOLOR:\n\nrestricted palette\n\n4–7 colors maximum\n\nmuted sophisticated tones\n\nmuseum-quality color relationships\n\navoid bright saturation\n\navoid gradients\n\nprimarily flat color surfaces\n\nTEXTURE:\n\nsubtle paper texture\n\nvery soft grain\n\nmatte finish\n\nno obvious brush strokes\n\nno realism\n\nno photographic elements\n\nNO:\n\nno people\n\nno objects\n\nno symbols\n\nno icons\n\nno typography\n\nno illustrations\n\nno recognizable scenes\n\nno landscapes\n\nno decorative patterns\n\nThe image should feel like:\n\nsomething meaningful that exists before language,\n\na thought before it becomes a concept,\n\na word that has not yet been invented,\n\na signal waiting to be interpreted.\n\nTheme: [THEME]","category":"Abstract cover / banner","date":"2026-06-24","sourceConversation":"枝分かれ · 抽象的カバー画像依頼","duplicateCount":2,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"具体テーマ/添付パレット適用。"},{"id":"VP-112","title":"以下のオリエンをもとに、シンボルマーク+ロゴタイプの案を30案作って","body":"以下のオリエンをもとに、シンボルマーク+ロゴタイプの案を30案作って\n\n---\n\n店名\n茶の間　-結-\n（ちゃのま　ゆい）\n\n『ご縁が繋がり、今が有る。\n全てのご縁が結ばれた場所』\nということで、結 にしました。\n\n静岡茶がメイン\nゲストリーフとして、静岡以外の茶葉も定期入れ替え\n抹茶メインのスイーツ\n※食事系（軽食）は追々\n\n落ち着いた店内でゆったり3煎目くらいまで（ものによる）お茶を楽しんでもらう空間。\n\nコテコテにカッコいい空間\n↓\n\nhttps://www.instagram.com/tsukiwo_yomu?igsh=MWpiMXkydWR4dmhyZw==\n\nロゴリクエスト\n（あくまでリクエストなので無視しても全然OK）\n『結』の字をベースに、茶葉かお茶の湯気とか入れられたら。\n和モダン\nシンプル\n\n『人と人が繋がれる場所』\n作るお店がそんか場所でありたいのが、一つ大きな理由でして\n\n・お客さんと生産者\n・お茶とコーヒー\nこの2つを繋ぐ架け橋になれたら、という思いから\n\nまず、\n・コーヒーと比べてお茶を楽しむ場所が沖縄には絶望的に少ないこと\n・コーヒー屋がこれだけ乱立している中、コーヒーを飲めない層（特に若い世代）が一定数いること\n・そのために提供できるもの・するものは故郷の味（静岡出身ではない人からすると、お茶のワードから＝（イコール）で出てくる県）だからイメージしやすいこと\n\nが、静岡茶をメインにする理由、お茶カフェを作る理由で、、、\n\n・コーヒーをやってた人間がどうしてお茶に辿り着いたのかを伝えて、いずれは静岡を含む各地のお茶農家・問屋への訪問会や茶摘みとかの体験会を開催できれば。\n\n・コーヒー業界とお茶業界ってやってることは似てるのに、なぜか相容れない（一緒に盛り上げようとしない）ように見えるから、そこを繋ぐ架け橋になれたら（これは実際、静岡でコーヒー屋さんやってる友達も言ってたことだけど）\nって感じですね。","category":"Logo / typography","date":"2026-04-25","sourceConversation":"ロゴデザイン案提案","duplicateCount":1,"lineageRoot":"ROOT-LOGO-TYPO","curationStatus":"keep_variant","subject":"","tags":[],"notes":"茶の間-結-のロゴオリエン。プロンプトというより制作ブリーフ。"},{"id":"VP-113","title":"Create a single uppercase Latin letter in a custom typographic style based on the following rules.","body":"Create a single uppercase Latin letter in a custom typographic style based on the following rules.\n\nSTYLE CONCEPT:\nA sculptural, humanistic sans-serif letterform that feels somewhere between:\n- carved wood signage\n- stone engraving\n- Japanese folk craft aesthetics\n- modernist architectural lettering\n- handmade editorial typography\n- quiet brutalism\n\nThe result should feel intentional and refined, NOT playful, cartoonish, or retro.\n\nIMPORTANT:\nThis is NOT a normal geometric sans-serif font.\nThe letter must feel slightly irregular, subtly hand-shaped, and constructed as a black mass with white space carved out from it.\n\nSTRUCTURE RULES:\n- Very thick vertical strokes\n- Much thinner horizontal strokes\n- Slight inward curvature on vertical stems\n- Subtle optical distortion throughout\n- Outer silhouette should not be perfectly straight\n- Avoid mechanical geometry\n- Avoid perfect symmetry\n- No sharp precision\n\nTERMINALS:\n- Stroke endings are slightly angled\n- Do NOT use perfectly horizontal cuts\n- Terminal cuts should feel softly hand-trimmed\n- Angles are subtle, not dramatic\n\nINNER CORNERS:\n- All inner joints and counters use large rounded radii\n- Inner negative spaces should feel soft and carved\n- Avoid sharp inner corners completely\n\nNEGATIVE SPACE:\n- Design the letter as a solid black silhouette first\n- Then carve white space from inside\n- Prioritize beautiful negative space over strict typographic correctness\n\nPROPORTIONS:\n- Slightly condensed width\n- Tall and stable presence\n- Strong vertical emphasis\n- Heavy visual weight\n- Quiet monumentality\n\nSURFACE FEEL:\n- Flat solid black only\n- No outlines\n- No gradients\n- No textures\n- No shadows\n- Clean vector-like silhouette\n\nMOOD:\n- calm\n- restrained\n- architectural\n- handmade\n- slightly primitive\n- culturally timeless\n\nOUTPUT:\n- Single uppercase Latin letter only\n- Centered composition\n- White or light neutral background\n- High-resolution vector-like appearance\n- No additional typography or decoration","category":"Logo / typography","date":"2026-05-19","sourceConversati
