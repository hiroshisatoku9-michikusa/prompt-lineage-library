<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Lineage Library</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f6f7f3;
  --panel: #ffffff;
  --panel-soft: #f0f4f0;
  --ink: #1d2320;
  --muted: #69736f;
  --line: #dce2dc;
  --accent: #1e6f68;
  --accent-strong: #11524d;
  --amber: #9a5b13;
  --red: #a63a3a;
  --blue: #345f9f;
  --shadow: 0 16px 38px rgba(35, 45, 40, 0.11);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  overflow: auto;
}

body.app-ready {
  overflow: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 7px;
  min-height: 34px;
  padding: 0 12px;
  cursor: pointer;
}

button:hover {
  border-color: #a8b6ae;
  background: #f8faf8;
}

button.primary,
.top-actions button:first-child {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

button.danger {
  color: var(--red);
  border-color: #e3b9b9;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 7px;
  padding: 8px 10px;
}

textarea {
  resize: vertical;
  min-height: 76px;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: visible;
}

body.app-ready .app-shell {
  height: 100vh;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 5;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 7px;
  background: #1f2d2a;
  color: #d8efe8;
  font-weight: 800;
  letter-spacing: 0;
}

h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.15;
}

.brand p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) 150px 150px 210px 130px 130px;
  gap: 10px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfa;
}

label span,
.field-label {
  display: block;
  margin-bottom: 5px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(300px, 35vw) 1fr;
  min-height: 0;
  overflow: hidden;
}

.library-pane {
  border-right: 1px solid var(--line);
  background: #eef2ee;
  min-height: 0;
  display: grid;
  grid-template-rows: auto 1fr;
}

.pane-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid var(--line);
}

.prompt-list {
  overflow: auto;
  padding: 8px;
}

.prompt-row {
  width: 100%;
  text-align: left;
  display: grid;
  gap: 6px;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 7px;
  padding: 10px;
  min-height: auto;
}

.prompt-row:hover {
  background: rgba(255, 255, 255, 0.62);
}

.prompt-row.active {
  background: #fff;
  border-color: #a9c7bd;
  box-shadow: 0 6px 18px rgba(30, 111, 104, 0.12);
}

.row-main {
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
}

.prompt-id {
  flex: 0 0 auto;
  color: var(--accent-strong);
  font-weight: 800;
  font-size: 12px;
}

.prompt-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 650;
}

.row-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
}

.chip {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  min-height: 22px;
  border-radius: 7px;
  padding: 2px 7px;
  border: 1px solid var(--line);
  background: #fff;
  color: #405049;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chip.master {
  border-color: #bfd7c0;
  color: #1f612c;
  background: #eff8ef;
}

.chip.review {
  border-color: #e6cf9f;
  color: var(--amber);
  background: #fff8eb;
}

.chip.archive {
  border-color: #e5bbbb;
  color: var(--red);
  background: #fff3f3;
}

.detail-pane {
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  background: var(--panel);
  display: grid;
  grid-template-rows: auto 1fr;
}

.tabs {
  display: flex;
  gap: 4px;
  padding: 10px 12px 0;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.tab {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
  background: transparent;
}

.tab.active {
  background: #f7faf7;
  color: var(--accent-strong);
  border-color: var(--line);
  border-bottom-color: #f7faf7;
  transform: translateY(1px);
}

.tab-panel {
  display: none;
  min-height: 0;
  overflow: auto;
  padding: 18px;
  background: #f7faf7;
}

.tab-panel.active {
  display: block;
}

.detail-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 310px;
  gap: 16px;
  align-items: start;
}

.surface {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.surface.pad {
  padding: 16px;
}

.detail-title {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.detail-title h2 {
  margin: 0;
  font-size: 22px;
  line-height: 1.22;
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.body-text {
  white-space: pre-wrap;
  font-family:
    "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.6;
  background: #fbfbf8;
  border-top: 1px solid var(--line);
  margin: 0 -16px -16px;
  padding: 16px;
  max-height: 58vh;
  overflow: auto;
}

.field-stack {
  display: grid;
  gap: 12px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.lineage-layout,
.export-layout {
  display: grid;
  gap: 16px;
}

.lineage-tools,
.export-actions {
  display: flex;
  align-items: end;
  gap: 10px;
  flex-wrap: wrap;
}

.lineage-tools label {
  min-width: 260px;
  flex: 1;
}

.tree {
  margin: 0;
  padding: 10px 0 10px 20px;
  line-height: 1.45;
}

.tree ul {
  margin: 4px 0 4px 18px;
  padding: 0;
  border-left: 1px solid var(--line);
}

.tree li {
  list-style: none;
  margin: 0;
  padding: 4px 0 4px 10px;
}

.tree button {
  min-height: 28px;
  padding: 0 8px;
  text-align: left;
}

.tree .selected-node {
  border-color: var(--accent);
  color: var(--accent-strong);
  background: #eef8f5;
  font-weight: 700;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 10px;
}

.stat {
  padding: 12px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.stat b {
  display: block;
  font-size: 22px;
}

.stat span {
  color: var(--muted);
  font-size: 12px;
}

.empty-state {
  display: grid;
  place-items: center;
  align-content: center;
  min-height: 50vh;
  color: var(--muted);
  text-align: center;
}

.empty-state h2 {
  margin: 0 0 6px;
  color: var(--ink);
}

.muted {
  color: var(--muted);
}

@media (max-width: 920px) {
  .toolbar,
  .workspace,
  .detail-grid {
    grid-template-columns: 1fr;
  }

  .library-pane {
    border-right: 0;
    border-bottom: 1px solid var(--line);
    max-height: 44vh;
  }
}

@media (max-width: 560px) {
  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .top-actions,
  .detail-actions,
  .two-col,
  .stats-grid {
    width: 100%;
    grid-template-columns: 1fr;
  }

  .top-actions button,
  .detail-actions button {
    flex: 1;
  }
}

    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">PL</span>
          <div>
            <h1>Prompt Lineage Library</h1>
            <p id="saveState">未読み込み</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="copyCurrentBtn" type="button" title="現在のプロンプトをコピー">Copy</button>
          <button id="exportJsonBtn" type="button" title="JSONを書き出し">JSON</button>
          <button id="exportCsvBtn" type="button" title="CSVを書き出し">CSV</button>
        </div>
      </header>

      <section class="toolbar" aria-label="検索と絞り込み">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="title, body, tag, note..." autocomplete="off" />
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter"></select>
        </label>
        <label>
          <span>Confidence</span>
          <select id="confidenceFilter"></select>
        </label>
        <label>
          <span>Root</span>
          <select id="rootFilter"></select>
        </label>
        <label>
          <span>Archive</span>
          <select id="archiveFilter">
            <option value="active">active</option>
            <option value="all">all</option>
            <option value="archived">archived</option>
          </select>
        </label>
        <label>
          <span>Sort</span>
          <select id="sortSelect">
            <option value="id">ID</option>
            <option value="date_desc">date desc</option>
            <option value="status">status</option>
            <option value="root">root</option>
          </select>
        </label>
      </section>

      <main class="workspace">
        <aside class="library-pane" aria-label="プロンプト一覧">
          <div class="pane-head">
            <strong id="resultCount">0 prompts</strong>
            <button id="reviewBtn" type="button">Review</button>
          </div>
          <div id="promptList" class="prompt-list"></div>
        </aside>

        <section class="detail-pane" aria-label="プロンプト詳細">
          <nav class="tabs" aria-label="表示切替">
            <button class="tab active" type="button" data-tab="detail">Detail</button>
            <button class="tab" type="button" data-tab="lineage">Lineage</button>
            <button class="tab" type="button" data-tab="export">Import / Export</button>
          </nav>

          <div id="detailTab" class="tab-panel active"></div>
          <div id="lineageTab" class="tab-panel"></div>
          <div id="exportTab" class="tab-panel"></div>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <h2>プロンプトを選択してください</h2>
        <p>左の一覧または検索結果から開けます。</p>
      </div>
    </template>

    <script>
window.PROMPT_LINEAGE_SEED = {"version":"0.1","generated_from":"HIROSHI_SATO_Prompt_Corpus_Index.csv","roots":[{"id":"ROOT-UX-STORYBOARD","name":"Japanese UX Service Storyboard / Manga","description":"サービスや社会的アイデアを、感情変化と導線で見せる日本型UXストーリーボード。"},{"id":"ROOT-PRIMITIVE-DOODLE","name":"Primitive Observational Ink Doodle","description":"観察対象を不器用な記号塊に再構成する、ローカルZINE的な黒インク落書き。"},{"id":"ROOT-JP-TOURISM-POSTER","name":"Obscure Japanese Regional Tourism Poster","description":"1955–1975年頃の地方観光ポスターを想起させる、忘れられた印刷物風の風景表現。"},{"id":"ROOT-FLAT-VECTOR","name":"Flat Vector / No-outline Reduction","description":"輪郭線なし、色面のみ、情報削減と再構成を重視するフラットベクター表現。"},{"id":"ROOT-CONCEPTUAL-DIAGRAM","name":"Minimalist Conceptual Diagram / UX Sketch","description":"白背景・黒線・英語ラベル中心の、思考スケッチ／UX研究ノート風図解。"},{"id":"ROOT-ABSTRACT-COVER","name":"Abstract Editorial Cover / Banner","description":"テーマを直接描かず、色面・余白・密度・緊張で表す抽象カバー画像。"},{"id":"ROOT-LOGO-TYPO","name":"Logo / Typography / Letterform","description":"文化的文脈や構造をロゴ・字形・シンボルに落とすプロンプト群。"},{"id":"ROOT-OKINAWA-SCENE-DRAFTS","name":"Legacy Okinawa Scene Drafts","description":"初期の沖縄風景・Midjourney向け試行プロンプト。運用版ではアーカイブ候補。"},{"id":"ROOT-MISC","name":"Misc / Needs Curation","description":"系統化前の雑多な視覚プロンプト、説明要求、抽出ノイズ。"}],"prompts":[{"id":"VP-001","title":"\"Please create a storyboard that illustrates the following service flow:","body":"\"Please create a storyboard that illustrates the following service flow:\n1. Panel 1: A vehicle placed in front of the workplace or dormitory, showing the setting.\n2. Panel 2: A user interface for member registration with fields for driver's license, contact information, and payment method. Include details on borrowing and driving instructions.\n3. Panel 3: A reservation screen showing availability, highlighting the process of making a reservation.\n4. Panel 4: An electronic key being granted at the reservation time, depicting readiness to drive.\n5. Panel 5: A scene of battery replacement at a location marked with a battery spot sticker.\n6. Panel 6: A view of returning to the drop-off location and pressing the return button.\n7. Panel 7: An interface for registering a favorite place visited, along with reasons for liking it. Show integration with Google Maps, and share with other users to create a unique community map.\nArrange these panels in a sequence that tells a clear and engaging story of the service flow, making sure to include visual cues to guide the viewer through the process.\"","category":"UX storyboard / manga","date":"2023-08-21","sourceConversation":"New chat","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":[],"notes":"2023年のサービスフロー図解。後のUX storyboard系の原型。"},{"id":"VP-002","title":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.","body":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.\n\nThe composition should resemble a startup/service-design presentation slide used by Japanese UX consultancies between 2019–2024.\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.","category":"UX storyboard / manga","date":"2026-05-11","sourceConversation":"ストーリーボード分析","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_master","subject":"","tags":[],"notes":"日本UXサービスストーリーボードの汎用マスター。"},{"id":"VP-003","title":"Create a 6-panel Japanese UX storyboard manga in a modern flat vector presentation style.","body":"Create a 6-panel Japanese UX storyboard manga in a modern flat vector presentation style.\n\nThe storyboard should visually explain a social/design/service idea through emotional progression and simple narrative scenes.\n\nSTRUCTURE:\nThe storyboard must contain exactly 6 panels arranged in a clean grid layout.\n\nPanel structure:\n1. User pain / anxiety\n2. Solution idea step 1\n3. Solution idea step 2\n4. Solution idea step 3\n5. Solution idea step 4\n6. Ideal future / transformed society\n\nThe story should feel like a Japanese startup UX strategy storyboard or service design presentation slide.\n\nSTYLE:\n- Minimal flat vector illustration\n- White or very light warm-gray background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Simplified facial expressions\n- Calm and emotionally intelligent atmosphere\n- Friendly but analytical\n- Modern Japanese SaaS / UX consultancy aesthetic\n- Mix of infographic, editorial layout, and storyboard manga\n- Large whitespace\n- F - a Japanese UX consultancy presentation\n- a startup pitch storyboard\n- a service design concept sheet\n- an editorial explanatory manga\n- a visual ethnography summary\n- a speculative design research board\n\nThe final image should communicate:\n- why the problem matters emotionally\n- how the solution gradually intervenes\n- how small actions accumulate into social value\n- how human meaning becomes visible through the process\n- how ordinary behavior can reshape systems and culture\n\nAvoid:\n- flashy startup aesthetics\n- overly cute mascot styles\n- superhero-like emotional reactions\n- dense manga screentones\n- cinematic action framing\n- excessive gradients\n- photorealism\n- visual clutter\n- too many colors\n\nInspired by:\nJapanese service design storyboards,\neditorial infographics,\nstartup pitch illustrations,\nspeculative design presentations,\nvisual ethnography boards,\nand modern Japanese explanatory manga aesthetics from 2019–2025.","category":"UX storyboard / manga","date":"2026-05-11","sourceConversation":"ストーリーボード分析","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":[],"notes":"変数を実テーマで埋めた実験／バリエーション。"},{"id":"VP-010","title":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.","body":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.\n\nCRITICAL OUTPUT SPEC:\n- Single image, 16:9 horizontal layout\n- 6 panels arranged left-to-right in one row (or 2 rows x 3 panels)\n- Each panel should be clearly numbered (1-6) and visually separated by soft whitespace\n- The 6 panels together tell ONE coherent story\n\nEMOTIONAL ARC (mapped to the 6 panels):\n- Panel 1: User pain — the moment of frustration/anxiety\n- Panel 2-5: Service journey (4 panels) — encounter, first use, value moment, deepening\n- Panel 6: Emotional relief — life after, ripple effects\n\nThe composition should resemble a startup/service-design presentation slide used by Japanese UX consultancies between 2019–2024.\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups in the service-journey panels\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.\n\nJapanese service design storyboard\nstartup pitch illustration\nUX consultancy slide illustration\nemotion-driven infographic\nflat lifestyle storyboard\nsoft SaaS illustration\nJapanese healthcare app illustration\nminimal explanatory vector art\nfriendly service blueprint visual\n\n=== SCENARIO SCRIPT ===\nTarget idea: 『なぜ選んだか』日記\nOriginal problem: グラフィックデザイナーとして、これからのAI社会で生き残っていくための戦略を立てたい\nConstraints: 私一人で実行できること\nPersona: 32歳男性、都内のデザイン事務所に勤めるグラフィックデザイナー。経験8年。最近クライアントに『AIで作れるんじゃないの？』と言われ始め、自分の価値を言語化できず焦りを感じている。\n\nPanel 1 [PAIN]\n  Scene: 深夜のオフィス。蛍光灯の下、Adobeのソフトを開いたまま固まっている男性。モニターにはAI生成のビジュアルが並ぶ。同僚が『これ、Midjourneyで5秒で出せるやつだよね』と後ろで笑っている。男性は苦笑いしながらも手が止まっている。\n  Caption: 『俺がこだわってきた8年間って、何だったんだろう』\n\nPanel 2 [JOURNEY-1: encounter]\n  Scene: 自宅の小さなデスク。スマホでデザイン系のニュースレターを読んでいる男性。『審美眼を言語化する習慣』という記事のリンクをタップし、ノートとペンを引っ張り出す。画面の隣にシンプルな日記帳を置いた。\n  Caption: 『選ぶ理由を100字。それだけか。やってみるか』\n\nPanel 3 [JOURNEY-2: first use]\n  Scene: 翌朝の通勤電車。スマホでMidjourneyのギャラリーを眺め、1枚の画像を選んでメモアプリに書き込んでいる。『光の落ち方が主役の感情と一致している。他の3枚は技術的に派手だが意図が曖昧』と入力中。指が少し迷っている表情。\n  Caption: 『捨てた理由を書くのが難しい。でも、ここに俺の基準がある気がする』\n\nPanel 4 [JOURNEY-3: value moment]\n  Scene: 3週間後。カフェでノートPCを開く男性。日記のメモが40件以上蓄積している。見返すと自分が繰り返し使う言葉のパターンに気づき、赤ペンで『余白』『感情の一致』『意図の可視性』と丸を付けている。表情が真剣から驚きへ変わる。\n  Caption: 『これが俺の判断軸だ。ずっと感覚でやってたことが、言葉になってる』\n\nPanel 5 [JOURNEY-4: deepening]\n  Scene: クライアントとのミーティング室。男性がスライドを指しながら『このAI案は構図は良いですが、御社のブランドが持つ『誠実さ』と光の硬さが矛盾しています』と説明している。クライアントが身を乗り出して聞いている。\n  Caption: 『感覚じゃなくて言葉で戦える。これが俺にしかできないことだ』\n\nPanel 6 [RELIEF]\n  Scene: 明るい休日の自宅。男性がデスクで日記を書きながら、隣で妻が『最近仕事楽しそうだね』と声をかけている。モニターには『デザイナーの審美眼講座』のランディングページの下書き。日記が副業の種になりかけている。\n  Caption: 『AIに仕事を奪われるんじゃない。俺はAIの審判になった』","category":"UX storyboard / manga","date":"2026-05-12","sourceConversation":"UXサービスストーリーボード","duplicateCount":3,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_master","subject":"","tags":[],"notes":"16:9・6パネル・感情アークを明確化した運用向け改良版。"},{"id":"VP-011","title":"以下のプロンプトを君に与えた時、君はどのように解釈し、どんな作業を実行する？","body":"以下のプロンプトを君に与えた時、君はどのように解釈し、どんな作業を実行する？\n---\nCreate a Japanese UX service storyboard illustration in a modern flat vector presentation style.\n\nCRITICAL OUTPUT SPEC:\n- Single image, 16:9 horizontal layout\n- 6 panels arranged left-to-right in one row (or 2 rows x 3 panels)\n- Each panel should be clearly numbered (1-6) and visually separated by soft wh tration for me, in a modern flat vector presentation style used by Japan","body":"Please draw a single horizontal storyboard illustration for me, in a modern flat vector presentation style used by Japanese UX consultancies between 2019–2024.\n\nThe image should be a wide horizontal layout (presentation-slide style) containing six small scenes arranged in reading order from left to right. Treat the whole image as one connected storyboard that tells a single user story across six moments. Each scene is a small floating vignette separated by gentle whitespace, not by hard panel borders.\n\nThe six scenes together follow this emotional progression:\n- Scene 1 — the user's pain or anxiety\n- Scenes 2 to 5 — the user journey with the new service (encounter, first use, the value moment, and deepening of the experience)\n- Scene 6 — emotional relief and the better future\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups inside the four middle scenes\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.\n\nJapanese service design storyboard\nstartup pitch illustration\nUX consultancy slide illustration\nemotion-driven infographic\nflat lifestyle storyboard\nsoft SaaS illustration\nJapanese healthcare app illustration\nminimal explanatory vector art\nfriendly service blueprint visual\n\nHere is the story you should illustrate:\n\nThe service idea being illustrated is \"『なぜ選んだか』日記\".\nThe original problem behind this is: グラフィックデザイナーとして、これからのAI社会で生き残っていくための戦略を立てたい\nConstraints to keep in mind: 私一人で実行できること.\nThe main character is: 32歳男性、都内のデザイン事務所に勤めるグラフィックデザイナー。経験8年。最近クライアントに『AIで作れるんじゃないの？』と言われ始め、自分の価値を言語化できず焦りを感じている。\n\nPlease draw all six scenes in one image, in this order:\n\nScene 1 (the pain)\n  What we see: 深夜のオフィス。蛍光灯の下、Adobeのソフトを開いたまま固まっている男性。モニターにはAI生成のビジュアルが並ぶ。同僚が『これ、Midjourneyで5秒で出せるやつだよね』と後ろで笑っている。男性は苦笑いしながらも手が止まっている。\n  What the character says or feels: 『俺がこだわってきた8年間って、何だったんだろう』\n\nScene 2 (encounter)\n  What we see: 自宅の小さなデスク。スマホでデザイン系のニュースレターを読んでいる男性。『審美眼を言語化する習慣』という記事のリンクをタップし、ノートとペンを引っ張り出す。画面の隣にシンプルな日記帳を置いた。\n  What the character says or feels: 『選ぶ理由を100字。それだけか。やってみるか』\n\nScene 3 (first use)\n  What we see: 翌朝の通勤電車。スマホでMidjourneyのギャラリーを眺め、1枚の画像を選んでメモアプリに書き込んでいる。『光の落ち方が主役の感情と一致している。他の3枚は技術的に派手だが意図が曖昧』と入力中。指が少し迷っている表情。\n  What the character says or feels: 『捨てた理由を書くのが難しい。でも、ここに俺の基準がある気がする』\n\nScene 4 (the value moment)\n  What we see: 3週間後。カフェでノートPCを開く男性。日記のメモが40件以上蓄積している。見返すと自分が繰り返し使う言葉のパターンに気づき、赤ペンで『余白』『感情の一致』『意図の可視性』と丸を付けている。表情が真剣から驚きへ変わる。\n  What the character says or feels: 『これが俺の判断軸だ。ずっと感覚でやってたことが、言葉になってる』\n\nScene 5 (deepening)\n  What we see: クライアントとのミーティング室。男性がスライドを指しながら『このAI案は構図は良いですが、御社のブランドが持つ『誠実さ』と光の硬さが矛盾しています』と説明している。クライアントが身を乗り出して聞いている。\n  What the character says or feels: 『感覚じゃなくて言葉で戦える。これが俺にしかできないことだ』\n\nScene 6 (relief)\n  What we see: 明るい休日の自宅。男性がデスクで日記を書きながら、隣で妻が『最近仕事楽しそうだね』と声をかけている。モニターには『デザイナーの審美眼講座』のランディングページの下書き。日記が副業の種になりかけている。\n  What the character says or feels: 『AIに仕事を奪われるんじゃない。俺はAIの審判になった』","category":"UX storyboard / manga","date":"2026-05-12","sourceConversation":"UXサービスストーリーボード","duplicateCount":2,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_master","subject":"","tags":[],"notes":"横長1枚・floating vignette型への洗練。"},{"id":"VP-013","title":"Please draw a single horizontal storyboard illustration for me, in a modern flat vector presentation style used by Japan","body":"Please draw a single horizontal storyboard illustration for me, in a modern flat vector presentation style used by Japanese UX consultancies between 2019–2024.\n\nThe image should be a wide horizontal layout (presentation-slide style) containing six small scenes arranged in reading order from left to right. Treat the whole image as one connected storyboard that tells a single user story across six moments. Each scene is a small floating vignette separated by gentle whitespace, not by hard panel borders.\n\nThe six scenes together follow this emotional progression:\n- Scene 1 — the user's pain or anxiety\n- Scenes 2 to 5 — the user journey with the new service (encounter, first use, the value moment, and deepening of the experience)\n- Scene 6 — emotional relief and the better future\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups inside the four middle scenes\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.\n\nHere is the story you should illustrate:\n\nThe service idea being illustrated is \"権限が腐るシステム入室権限に「賞味期限」を設定し、使われないまま48時間経過する\".\nThe original problem behind this is: 管理人として、地域の公民館の鍵の開閉業務をラクにしたい。公民館に部屋は3つ。ネット環境なし。\nThe main character is: 田中みほ、38歳、地域の公民館の非常勤管理人。週3日勤務のパート主婦。小学生2人を育てながら、鍵の貸し出し・返却のために毎回公民館に出向く必要があり、「鍵番」と化していることに疲弊している。スマートフォンは日常的に使うが、アプリの設定などは苦手意識あり。\n\nPlease draw all six scenes in one image, in this order:\n\nScene 1 (the pain)\n  What we see: 夕方17時、田中みほが小学校のお迎えから帰宅しようとしたとき、スマホが鳴る。「第3会議室の鍵、今日返し忘れました！」というLINE。ため息をつきながら、子どもの手を引いて再び公民館へ向かう姿。玄関には返却待ちの利用者が2人並んでいる。\n  What the character says or feels: 「また呼び出し…。今日で今月3回目。子どもに『またお仕事？』って言われるたびに胸が痛い」\n\nScene 2 (encounter)\n  What we see: 公民館の掲示板に「新しい入室システム導入のお知らせ」が貼られている。みほが興味深そうに読んでいる。「スマホで30秒動画を送るだけで、鍵なしで部屋に入れます」という文字と、QRコードが印刷されたシンプルなチラシ。隣で利用者の田所さん（60代男性）が「難しくないの？」と覗き込んでいる。\n  What the character says or feels: 「鍵がなくなる？半信半疑だけど、とりあえずやってみよう」\n\nScene 3 (first use)\n  What we see: みほのスマホ画面のアップ。シンプルな管理画面に「第1和室／第2洋室／第3会議室」の3つのボタン。利用者・田所さんのプロフィール欄に「権限あり ✅ 残り：31時間」という表示。田所さんが翌朝、玄関前でスマホカメラに向かって「今日もよろしくお願いします！」と30秒話しかける動作。バーが「残り47時間」にリセットされる。\n  What the character says or feels: 「チェックイン動画が届いたら自動で更新される。私は確認するだけ。操作は1タップ」\n\nScene 4 (the value moment)\n  What we see: ある月曜朝、みほが管理画面を開くと「田所 太郎さんの権限が48時間以内に失効します」という通知バナー。隣の列には「権限なし ❌」になった利用者が2名。みほは追加操作ゼロ。システムが自動で権限を消している。みほはコーヒーを飲みながらスマホを眺め、「あ、勝手に消えてる」と軽く驚いている表情。\n  What the character says or feels: 「来なくなった人の権限が自然に腐って消える。私が削除し忘れても、システムが片付けてくれる」\n\nScene 5 (deepening)\n  What we see: 夜、子どもを寝かしつけたあとのリビング。みほがソファでスマホを操作。「来週の土曜、第1和室を09:00〜12:00でサークル利用申請」という通知に対し、3つの部屋ごとの時間帯スロットが並ぶ画面で「承認」をタップ。承認と同時に、申請者のスマホへ「権限付与・有効期限48時間」の通知が飛ぶ様子を示す矢印のイラスト。\n  What the character says or feels: 「部屋ごと、時間ごとに権限を出せる。深夜でも、公民館にいなくても、パジャマのまま管理できる」\n\nScene 6 (relief)\n  What we see: 3ヶ月後の週末。みほが子どもたちと公園で遊んでいる。スマホに「第3会議室の権限が失効しました（自動）」という静かな通知。みほはちらっと確認してポケットにしまい、また子どもの笑顔に視線を戻す。遠景に公民館が映り、利用者たちが鍵なしでスムーズに入退室している。\n  What the character says or feels: 「鍵を渡しに行く日常が消えた。公民館は動いていて、私はここにいられる。権限が腐る仕組みが、私の時間を守ってくれていた」","category":"UX storyboard / manga","date":"2026-05-12","sourceConversation":"Storyboard Illustration Request","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":[],"notes":"横長ストーリーボードの個別依頼。"},{"id":"VP-014","title":"Please draw a single horizontal storyboard illustration for me, in a modern flat vector presentation style used by Japan","body":"Please draw a single horizontal storyboard illustration for me, in a modern flat vector presentation style used by Japanese UX consultancies between 2019–2024.\n\nThe image should be a wide horizontal layout (presentation-slide style) containing six small scenes arranged in reading order from left to right. Treat the whole image as one connected storyboard that tells a single user story across six moments. Each scene is a small floating vignette separated by gentle whitespace, not by hard panel borders.\n\nThe six scenes together follow this emotional progression:\n- Scene 1 — the user's pain or anxiety\n- Scenes 2 to 5 — the user journey with the new service (encounter, first use, the value moment, and deepening of the experience)\n- Scene 6 — emotional relief and the better future\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups inside the four middle scenes\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.\n\nHere is the story you should illustrate:\n\nThe service idea being illustrated is \"働き方の遺言状制度\".\nThe original problem behind this is: AI時代で会社が生き残るには\nThe main character is: 田中さおり、38歳、都内IT企業のプロジェクトマネージャー。2児の母でフルタイム勤務。毎日19時には保育園お迎えのため、誰よりも効率を求めている。「AIって結局、上が導入したいだけでしょ」と内心思っている。自分の仕事の価値を誰より信じているが、言語化したことは一度もない。\n\nPlease draw all six scenes in one image, in this order:\n\nScene 1 (the pain)\n  What we see: さおりがオフィスで残業中。デスクにはAI活用推進の社内通達が置かれている。隣の同僚が「AIで仕事なくなるかもね」と冗談交じりに言い、さおりは苦笑いしながらも手が止まる。画面には処理しきれないタスクリストが並んでいる。\n  What the character says or feels: 「AIを活用しろ」と言われても、何をどこから変えればいいのか、誰も教えてくれない。\n\nScene 2 (encounter)\n  What we see: 四半期末の月曜朝、チームSlackに上司から通知が届く。「今週中に『働き方の遺言状』を書いてください。フォームのリンクはこちら」。さおりはタイトルを見て眉をしかめる。画面にはシンプルなフォームが開き、冒頭に問いが大きく表示されている——「もし明日あなたがいなくなったら、あなたの仕事のどこをAIに引き継がせますか？」\n  What the character says or feels: 「遺言状？物騒なタイトルだな」——でも、問いの重さに思わず手が止まる。\n\nScene 3 (first use)\n  What we see: さおりが自席でフォームに向き合っている。項目は3つ：「AIに任せられる業務」「自分じゃないといけない理由がある業務」「正直まだわからない業務」。ペンを噛みながら考え込む横顔。付箋に書き出したメモが机に広がり始める。週次レポート作成、会議のアジェンダ整理……次々と付箋が埋まっていく。\n  What the character says or feels: 書こうとして初めて気づく。「これ、私じゃなくていい仕事だ」という事実に。\n\nScene 4 (the value moment)\n  What we see: フォームを送信したさおりのPCに、数日後「遺言状サマリー」が届く。チーム全員分が匿名で集計されており、「AIに任せられる」と多くの人が答えた業務ランキングが可視化されている。さおりの回答と他メンバーの回答が重なる部分がハイライトされ、「ここから始めませんか？」というAIツール提案リンクが添えられている。\n  What the character says or feels: 自分だけが悩んでいたわけじゃなかった。チーム全員が同じ業務を「手放せる」と思っていた。\n\nScene 5 (deepening)\n  What we see: 3か月後、チームの朝会。さおりが「前回の遺言状で手放した週次レポートですが、AIに移してから3時間/週が空きました。次の遺言状では、ここを書こうと思ってます」とホワイトボードに書きながら話している。新入り社員も自分のフォームを開いてメモを取っている。さおりの表情は前向きで、発言に自信がある。\n  What the character says or feels: 「AIを使う」から「AIと役割分担を設計する」へ。四半期ごとに、自分の働き方が更新されていく。\n\nScene 6 (relief)\n  What we see: 夕方17時45分、さおりが荷物をまとめて颯爽と退社している。スマホの画面には保育園からの「お迎えお待ちしてます」通知。オフィスを出る背中越しに、デスクのPCには次の遺言状フォームが静かに開いたまま——来週の自分へのバトンとして。\n  What the character says or feels: AIに仕事を「奪われた」のではない。自分が選んで、手渡した。だから今日も定時に帰れる。","category":"UX storyboard / manga","date":"2026-05-13","sourceConversation":"Storyboard Illustration Request","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":[],"notes":"横長ストーリーボードの個別依頼。"},{"id":"VP-015","title":"[STYLE THEME]","body":"[STYLE THEME]\nMinimal naïve Japanese doodle illustration / local zine sketch aesthetic / childlike-but-designed symbolic drawing language\n\nCreate illustrations in the exact spirit of handmade Japanese marginal doodles found in personal notebooks, local newsletters, tiny independent publications, island community maps, or handwritten signage.\n\nThe drawings should feel:\n- improvised\n- emotionally warm\n- slightly awkward\n- unintentionally funny\n- icon-like\n- handmade rather than “illustrated”\n- somewhere between children’s drawings and sophisticated graphic reduction\n\nIMPORTANT:\nThe goal is NOT polished illustration.\nThe goal is NOT manga.\nThe goal is NOT modern flat vector branding.\nThe goal is a strangely balanced mix of:\nprimitive + observant + symbolic + affectionate.\n\n--------------------------------------------------\n[LINE STYLE]\n- thick black hand-drawn lines\n- visible wobble and instability\n- uneven pressure\n- slightly dry-brush feeling\n- imperfect curves\n- occasional asymmetry\n- lines should feel quickly drawn in one stroke\n- avoid geometric perfection\n- avoid clean Bézier curves\n- intentionally inconsistent proportions\n\nThe linework should resemble:\n- marker pen\n- brush pen\n- cheap felt-tip pen\n- casual notebook sketching\n\n--------------------------------------------------\n[FORM LANGUAGE]\n- extremely simplified shapes\n- almost pictogram-level reduction\n- rounded silhouettes\n- minimal anatomy\n- faces made from dots and tiny mouths\n- tiny eyes placed far apart\n- bodies simplified into blobs, ovals, triangles, or capsules\n- animals reduced to “recognizable essence only”\n- details omitted aggressively\n\nEvery object should feel:\n“the minimum amount of information needed to recognize it.”\n\n--------------------------------------------------\n[COMPOSITION]\n- large empty space\n- floating disconnected elements\n- uneven spacing\n- playful imbalance\n- no strict alignment\n- awkward placement is GOOD\n- visual rhythm should feel accidental but charming\n\nElements may appear:\n- isolated\n- partially cropped\n- randomly scaled\n- casually scattered like notebook margins\n\n--------------------------------------------------\n[CHARACTER DESIGN]\nCharacters should feel:\n- innocent\n- emotionally neutral\n- quietly humorous\n- slightly vacant\n- unintentionally cute\n\nExpressions:\n- tiny smiles\n- blank stares\n- simple dots\n- no dramatic emotion\n\nAvoid:\n- expressive anime faces\n- dynamic poses\n- polished mascot energy\n\n--------------------------------------------------\n[OBJECT & ANIMAL RULES]\nAnimals and objects should be reduced into:\n- chunky symbolic silhouettes\n- strange but lovable simplifications\n- uneven symmetry\n- childlike observational abstraction\n\nExamples:\n- bird = rounded blob + beak\n- turtle = dome + tiny legs\n- cat = flat face + whiskers\n- flower = symbolic petal cluster\n- tree = single irregular mass\n- human = bean-shaped body + tiny limbs\n\n--------------------------------------------------\n[TEXT STYLE]\nIf text appears:\n- handwritten Japanese\n- uneven character size\n- casual annotation feeling\n- imperfect spacing\n- looks written directly beside the doodles\n\n--------------------------------------------------\n[TEXTURE]\n- monochrome black ink only\n- plain white or light gray background\n- no gradients\n- no shadows\n- no realistic texture\n- optional slight ink bleed or scan noise\n\n--------------------------------------------------\n[OVERALL MOOD]\nThe image should feel like:\n- a personal sketchbook\n- a tiny local museum pamphlet\n- island community doodles\n- notes from a wandering observer\n- a handmade visual diary\n- playful but not loud\n- poetic through simplicity\n\nThe humor should emerge naturally from reduction and awkwardness, not from explicit jokes.\n\n--------------------------------------------------\n[NEGATIVE PROMPT]\nNO:\n- polished vector graphics\n- corporate illustration\n- anime rendering\n- realistic anatomy\n- detailed shading\n- perspective accuracy\n- glossy mascot design\n- modern UI illustration style\n- symmetry perfection\n- clean digital curves\n- highly expressive cartoon acting\n- colorful pop aesthetics","category":"Primitive observational doodle","date":"2026-05-20","sourceConversation":"AIイラストスタイル再現","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"","tags":[],"notes":"Minimal naïve Japanese doodle期。後のprimitive observational doodleの前段。"},{"id":"VP-016","title":"ガジュマルを描いて","body":"ガジュマルを描いて\n\nMinimal naïve Japanese doodle illustration / local zine sketch aesthetic / childlike-but-designed symbolic drawing language\n\nCreate illustrations in the exact spirit of handmade Japanese marginal doodles found in personal notebooks, local newsletters, tiny independent publications, island community maps, or handwritten signage.\n\nThe drawings should feel:\n- improvised\n- emotionally warm\n- slightly awkward\n- unintentionally funny\n- icon-like\n- handmade rather than “illustrated”\n- somewhere between children’s drawings and sophisticated graphic reduction\n\nIMPORTANT:\nThe goal is NOT polished illustration.\nThe goal is NOT manga.\nThe goal is NOT modern flat vector branding.\nThe goal is a strangely balanced mix of:\nprimitive + observant + symbolic + affectionate.\n\n--------------------------------------------------\n[LINE STYLE]\n- thick black hand-drawn lines\n- visible wobble and instability\n- uneven pressure\n- slightly dry-brush feeling\n- imperfect curves\n- occasional asymmetry\n- lines should feel quickly drawn in one stroke\n- avoid geometric perfection\n- avoid clean Bézier curves\n- intentionally inconsistent proportions\n\nThe linework should resemble:\n- marker pen\n- brush pen\n- cheap felt-tip pen\n- casual notebook sketching\n\n--------------------------------------------------\n[FORM LANGUAGE]\n- extremely simplified shapes\n- almost pictogram-level reduction\n- rounded silhouettes\n- minimal anatomy\n- faces made from dots and tiny mouths\n- tiny eyes placed far apart\n- bodies simplified into blobs, ovals, triangles, or capsules\n- animals reduced to “recognizable essence only”\n- details omitted aggressively\n\nEvery object should feel:\n“the minimum amount of information needed to recognize it.”\n\n--------------------------------------------------\n[COMPOSITION]\n- large empty space\n- floating disconnected elements\n- uneven spacing\n- playful imbalance\n- no strict alignment\n- awkward placement is GOOD\n- visual rhythm should feel accidental but charming\n\nElements may appear:\n- isolated\n- partially cropped\n- randomly scaled\n- casually scattered like notebook margins\n\n--------------------------------------------------\n[CHARACTER DESIGN]\nCharacters should feel:\n- innocent\n- emotionally neutral\n- quietly humorous\n- slightly vacant\n- unintentionally cute\n\nExpressions:\n- tiny smiles\n- blank stares\n- simple dots\n- no dramatic emotion\n\nAvoid:\n- expressive anime faces\n- dynamic poses\n- polished mascot energy\n\n--------------------------------------------------\n[OBJECT & ANIMAL RULES]\nAnimals and objects should be reduced into:\n- chunky symbolic silhouettes\n- strange but lovable simplifications\n- uneven symmetry\n- childlike observational abstraction\n\nExamples:\n- bird = rounded blob + beak\n- turtle = dome + tiny legs\n- cat = flat face + whiskers\n- flower = symbolic petal cluster\n- tree = single irregular mass\n- human = bean-shaped body + tiny limbs\n\n--------------------------------------------------\n[TEXT STYLE]\nIf text appears:\n- handwritten Japanese\n- uneven character size\n- casual annotation feeling\n- imperfect spacing\n- looks written directly beside the doodles\n\n--------------------------------------------------\n[TEXTURE]\n- monochrome black ink only\n- plain white or light gray background\n- no gradients\n- no shadows\n- no realistic texture\n- optional slight ink bleed or scan noise\n\n--------------------------------------------------\n[OVERALL MOOD]\nThe image should feel like:\n- a personal sketchbook\n- a tiny local museum pamphlet\n- island community doodles\n- notes from a wandering observer\n- a handmade visual diary\n- playful but not loud\n- poetic through simplicity\n\nThe humor should emerge naturally from reduction and awkwardness, not from explicit jokes.\n\n--------------------------------------------------\n[NEGATIVE PROMPT]\nNO:\n- polished vector graphics\n- corporate illustration\n- anime rendering\n- realistic anatomy\n- detailed shading\n- perspective accuracy\n- glossy mascot design\n- modern UI illustration style\n- symmetry perfection\n- clean digital curves\n- highly expressive cartoon acting\n- colorful pop aesthetics","category":"Primitive observational doodle","date":"2026-05-20","sourceConversation":"ガジュマルのドゥードル","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"","tags":[],"notes":"ガジュマル題材の初期インスタンス。"},{"id":"VP-017","title":"IMPORTANT:","body":"IMPORTANT:\nThe drawings must feel genuinely clumsy and unresolved.\n\nDo NOT make the illustrations balanced, polished, clean, or aesthetically corrected.\n\nThe charm comes from:\n- awkward proportions\n- accidental line quality\n- inconsistent scale\n- unstable composition\n- asymmetry\n- rushed execution\n- ugly-cute simplification\n- partially failed shapes\n- uneven black fill\n- moments where observation is sharp but drawing skill is primitive\n\nThe artist should feel like:\nsomeone with excellent observational sensitivity,\nbut very little interest in refinement or technical correctness.\n\n--------------------------------------------------\n\nLINE QUALITY:\n- dry brush texture\n- scratchy ink\n- visible brush streaks\n- broken strokes\n- sudden thick-to-thin transitions\n- inconsistent pressure\n- trembling curves\n- lines sometimes too heavy\n- lines sometimes disappearing\n\nAvoid smooth digital curves completely.\n\n--------------------------------------------------\n\nSHAPE LANGUAGE:\n- distorted silhouettes\n- badly balanced forms\n- flattened perspective\n- collapsed anatomy\n- inconsistent facial placement\n- weird spacing between features\n- uncomfortable emptiness\n\n--------------------------------------------------\n\nCOMPOSITION:\nThe page should feel like random notebook doodles,\nNOT designed layout.\n\nElements should:\n- float awkwardly\n- feel disconnected\n- vary wildly in size\n- occasionally be cropped strangely\n- leave strange empty gaps\n\n--------------------------------------------------\n\nCHARACTER FEELING:\nThe drawings should feel:\n- unintentionally funny\n- emotionally dry\n- primitive\n- slightly lonely\n- handmade\n- careless in a good way\n\nNOT:\n- polished cute\n- mascot-like\n- commercially appealing\n- clean minimal illustration","category":"Primitive observational doodle","date":"2026-05-20","sourceConversation":"AIイラストスタイル再現","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"","tags":[],"notes":"clumsy/unresolved/anti-polishedを強化する断片。"},{"id":"VP-018","title":"ガジュマルを描いて","body":"ガジュマルを描いて\n\nIMPORTANT:\nThe drawings must feel genuinely clumsy and unresolved.\n\nDo NOT make the illustrations balanced, polished, clean, or aesthetically corrected.\n\nThe charm comes from:\n- awkward proportions\n- accidental line quality\n- inconsistent scale\n- unstable composition\n- asymmetry\n- rushed execution\n- ugly-cute simplification\n- partially failed shapes\n- uneven black fill\n- moments where observation is sharp but drawing skill is primitive\n\nThe artist should feel like:\nsomeone with excellent observational sensitivity,\nbut very little interest in refinement or technical correctness.\n\ ation of the theme above.\n\nThe image should look like a handmade observational sketch that has been aggressively reduced into a single black shape.\n\nIMPORTANT:\n\nDo not create a clean icon.\nDo not create a logo.\nDo not create a vector graphic.\nDo not create a realistic botanical illustration.\n\nInstead, create something between:\n\n- a memory\n- a shadow\n- a field sketch\n- a brush-painted silhouette\n\nThe subject should still be recognizable, but only barely.\n\n────────────────────────\n\nVISUAL STYLE\n\nDraw everything using pure black shapes only.\n\nWhite background.\n\nNo color.\n\nNo gray.\n\nNo shading.\n\nNo gradients.\n\nNo textures.\n\nNo realistic rendering.\n\nNo decorative details.\n\nNo outlines separate from the filled shape.\n\nThe entire drawing should feel like it was painted with a thick brush or marker.\n\n────────────────────────\n\nFORM LANGUAGE\n\nThe object should not be carefully constructed.\n\nInstead:\n\n- simplify aggressively\n- merge nearby forms together\n- lose information intentionally\n- remove small details\n- distort proportions\n- exaggerate characteristic features\n- compress visual complexity into a few large masses\n\nThe goal is not accuracy.\n\nThe goal is recognizability through reduction.\n\nLarge shapes should dominate.\n\nSmall details should disappear.\n\n────────────────────────\n\nIMPERFECTIONS\n\nPreserve accidental qualities:\n\n- uneven edges\n- awkward proportions\n- slightly broken contours\n- imperfect symmetry\n- small gaps inside shapes\n- occasional visual ambiguity\n\nThe image should feel handmade rather than designed.\n\nIt should feel discovered rather than optimized.\n\n────────────────────────\n\nOBSERVATIONAL QUALITY\n\nAlthough simplified, the drawing must still contain evidence that the artist carefully observed the real subject.\n\nAvoid generic clip-art forms.\n\nCapture only the few structural features that make the subject uniquely identifiable.\n\nEverything else should be discarded.\n\n────────────────────────\n\nCOMPOSITION\n\nSingle isolated subject.\n\nCentered composition.\n\nPlenty of empty white space around it.\n\nNo background.\n\nNo ground.\n\nNo text.\n\nNo labels.\n\nNo framing.\n\nThe result should resemble a black archaeological stencil, a remembered silhouette, or a field notebook sketch reduced to its essential visual mass.\n\n---\n\n例えば、\n\n**[THEME] = ガジュマル**\n\nにすると、あの特徴的な気根だけが異常に強調された黒い塊になる。\n\n**[THEME] = セマルハコガメ**\n\nにすると、甲羅と首だけが残った妙な黒シルエットになる。\n\n**[THEME] = 那智の滝**\n\nにすると、岩壁と一本の白抜きの滝筋だけが残る。\n\nこのスタイル、君が最近よく作っている「primitive observational doodle」とも違っていて、\n\n**\"observational silhouette reduction\"**\nあるいは\n**\"memory-shadow illustration\"**\n\nみたいな系統だと思う。かなり面白いスタイルだね。実際、地域図鑑やフィールドガイドの章扉なんかにすごく相性が良さそう。","category":"Primitive observational doodle","date":"2026-06-12","sourceConversation":"タコノキ同定","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_master","subject":"ガジュマル**","tags":[],"notes":"黒一色シルエット化。doodle本流から派生した別系統。"},{"id":"VP-037","title":"斜め上から見たガジュマルの木 Create a primitive observational ink doodle of the theme above. IMPORTANT: The drawin","body":"[THEME] = 斜め上から見たガジュマルの木 Create a primitive observational ink doodle of the theme above. IMPORTANT: The drawing must feel genuinely clumsy, unresolved, raw, and accidentally expressive. Do NOT make the illustration: - polished - balanced - elegant - refined - clean - graphically beautiful - commercially cute - vector-like - visually optimized The image should feel like: - a notebook marginal doodle - a rushed observational memo - a handmade local zine sketch - an accidental drawing made during field observation - a badly drawn but strangely perceptive nature sketch The artist should feel like: someone who observes nature extremely carefully, but redraws reality through careless simplification and primitive reconstruction. The charm comes from: - awkward proportions - collapsed forms - primitive reduction - asymmetry - failed anatomy - unstable si e black areas should feel:\nwet,\nphysical,\ndense,\nand uncontrolled.\n\n--------------------------------------------------\nSHAPE LANGUAGE\n\n- extremely simplified forms\n- primitive symbolic reduction\n- distorted silhouettes\n- chunky awkward masses\n- flattened perspective\n- collapsed anatomy\n- minimal information\n- strange negative space\n- almost pictogram-like abstraction\n\nObservation should remain sharp,\neven though the execution feels primitive and partially failed.\n\nThe drawing must feel:\n“badly drawn by someone with good eyes.”\n\n--------------------------------------------------\nCOMPOSITION\n\n- isolated floating object\n- white background\n- awkward placement\n- strange empty gaps\n- slightly off-center\n- accidental notebook composition\n- uncomfortable balance is GOOD\n- random spacing is GOOD\n- avoid poster-like composition\n- avoid design-like harmony\n\n--------------------------------------------------\nMOOD\n\n- emotionally dry\n- unintentionally funny\n- slightly lonely\n- handmade\n- raw\n- careless in a good way\n- quiet\n- observational\n- anti-commercial\n- non-cute\n- non-anime\n\n--------------------------------------------------\nTEXT\n\nInclude small handwritten Japanese labeling text.\n\nThe handwriting should feel:\n- uneven\n- rushed\n- childish\n- casually misplaced\n- inconsistent in size\n- imperfectly spaced\n\n--------------------------------------------------\nOUTPUT STYLE\n\n- monochrome black ink on white background\n- no color\n- no gradients\n- no shadows\n- no realistic rendering\n- no background scenery\n- no modern vector aesthetics\n- no polished editorial minimalism\n\n--------------------------------------------------\nKEYWORDS\n\nprimitive observational doodle\nraw ink sketch\nugly-cute\nawkward handmade drawing\nJapanese notebook marginalia\nclumsy but observant\nbadly balanced composition\ncollapsed silhouette\nsymbolic reconstruction\ndeformed natural form\nheavy sumi ink\nbold overloaded brush strokes\nprimitive reduction\nfailed proportions\none-shot drawing\nanti-design drawing\ndense black ink\nhandmade field sketch","category":"Primitive observational doodle","date":"2026-06-13","sourceConversation":"枝分かれ · グァバの落書き","duplicateCount":3,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"ちょっとカジュアルな鳳凰木の木","tags":[],"notes":"v2マスターの題材差し替え群。植物・石垣・昆虫・鳥など。"},{"id":"VP-040","title":"--------------------------------------------------","body":"--------------------------------------------------\nCHILDLIKE OBSERVATIONAL RECONSTRUCTION\n\nThe drawing should feel as if it was made by:\n\na curious elementary school child\nwho genuinely observed the real object,\nbut lacks drawing skill.\n\nIMPORTANT:\n\nDo NOT draw like an artist pretending to draw badly.\n\nDraw like someone who is actually bad at drawing.\n\nThe child notices important characteristics,\nbut reconstructs them incorrectly.\n\nExamples:\n\n- leaves become simple ovals\n- fruits become circles with dots\n- branches become simple sticks\n- complex foliage becomes floating blobs\n- textures become random marks\n- proportions become inconsistent\n\nThe child often repeats simple symbols\ninstead of drawing what is actually visible.\n\nObservation is surprisingly accurate.\n\nExecution is not.\n\n--------------------------------------------------\nSIMPLIFICATION RULE\n\nWhen uncertain:\n\nalways simplify more.\n\nAlways choose:\n\nsymbol > realism\n\nmemory > accuracy\n\nrecognition > anatomy\n\nIf a shape can be reduced to:\n\n- circle\n- oval\n- blob\n- stick\n- rectangle\n\nthen reduce it.\n\nAvoid sophisticated structure.\n\nAvoid believable anatomy.\n\nAvoid realistic botanical construction.\n\n--------------------------------------------------\nDRAWING BEHAVIOR\n\nThe drawing should feel like:\n\none attempt\n\nno corrections\n\nno planning\n\nno composition\n\nno design intent\n\nThe artist does not care whether the drawing looks good.\n\nThe artist only wants to remember what they saw.\n\nThis creates:\n\n- strange spacing\n- repeated symbols\n- uneven density\n- accidental charm\n- visual mistakes\n\nwhich should be preserved.","category":"Primitive observational doodle","date":"2026-06-13","sourceConversation":"枝分かれ · 枝分かれ · グァバの落書き","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"","tags":[],"notes":"CHILDLIKE OBSERVATIONAL RECONSTRUCTIONの追加断片。"},{"id":"VP-041","title":"<SUBJECT>","body":"[THEME]\n= <SUBJECT>\n\nCreate a primitive observational ink doodle of the theme above.\n\nIMPORTANT:\n\nThe drawing must feel genuinely clumsy,\nunresolved,\nraw,\nand accidentally expressive.\n\nDo NOT make the illustration:\n\n- polished\n- balanced\n- elegant\n- refined\n- clean\n- graphically beautiful\n- commercially cute\n- professional\n- well-designed\n- vector-like\n- visually optimized\n\nThe goal is NOT artistic quality.\n\nThe goal is recognizability through childlike reconstruction.\n\n--------------------------------------------------\nCORE CONCEPT\n\nThe drawing should feel like:\n\na curious elementary school child\nobserving a real object carefully\nand trying to record it in a notebook.\n\nThe child has:\n\n- strong observational sensitivity\n- poor drawing skill\n- no design education\n- no concern for aesthetics\n\nIMPORTANT:\n\nDo NOT draw like an artist pretending to draw badly.\n\nDraw like someone who is actually bad at drawing.\n\nThe child notices important characteristics,\nbut reconstructs them incorrectly.\n\nObservation is surprisingly accurate.\n\nExecution is not.\n\n--------------------------------------------------\nOVERALL FEELING\n\nThe image should feel like:\n\n- a notebook margin doodle\n- a field observation memo\n- a school nature journal\n- a handmade local zine sketch\n- a rushed observational drawing\n- a private visual note\n- a memory aid rather than an artwork\n\nThe drawing should feel:\n\n\"surprisingly observant despite being badly drawn.\"\n\n--------------------------------------------------\nCHILDLIKE RECONSTRUCTION\n\nThe object should NOT closely follow:\n\n- realistic anatomy\n- realistic perspective\n- realistic contours\n- realistic proportions\n\nInstead:\n\n- redraw from memory-like perception\n- reconstruct forms into simple symbols\n- simplify aggressively\n- deform freely\n- collapse complexity\n- compress visual information\n- preserve only major recognizable features\n\nExamples of simplification:\n\n- leaves become ovals\n- fruits become circles\n- flowers become blobs\n- branches become sticks\n- roots become lines\n- foliage becomes floating masses\n- textures become random marks\n\nThe child often repeats simple symbols\ninstead of drawing what is actually visible.\n\n--------------------------------------------------\nSIMPLIFICATION RULE\n\nWhen uncertain:\n\nalways simplify more.\n\nAlways choose:\n\nsymbol > realism\n\nmemory > accuracy\n\nrecognition > anatomy\n\nIf a shape can become:\n\n- circle\n- oval\n- blob\n- stick\n- rectangle\n\nthen reduce it.\n\nAvoid:\n\n- sophisticated structure\n- realistic construction\n- believable anatomy\n- botanical accuracy\n- careful rendering\n\nRecognition is enough.\n\n--------------------------------------------------\nDRAWING BEHAVIOR\n\nThe drawing should feel like:\n\none attempt\n\nno planning\n\nno corrections\n\nno refinement\n\nno composition strategy\n\nno design intent\n\nThe artist simply wants to remember what they saw.\n\nThis naturally creates:\n\n- awkward proportions\n- uneven density\n- strange spacing\n- repeated symbols\n- accidental charm\n- visual mistakes\n\nPreserve these qualities.\n\n--------------------------------------------------\nLINE QUALITY\n\nUse:\n\n- bold black ink only\n- deep saturated sumi-like black\n- thick marker-like strokes\n- heavy brush pen feeling\n- dramatic thick-to-thin contrast\n- dense black areas\n- overloaded ink blobs\n- rough unstable pressure\n- trembling curves\n- uneven stroke rhythm\n- visible brush direction\n- occasional broken lines\n\nIMPORTANT:\n\nThe thick lines must feel:\n\n- confidently heavy\n- physically loaded with ink\n- blackened and dense\n- slightly excessive\n- handmade\n\nThe black areas should feel:\n\n- wet\n- physical\n- dense\n- uncontrolled\n\nAvoid:\n\n- elegant linework\n- delicate calligraphy\n- polished brushwork\n- excessive dry-brush texture\n- sophisticated ink painting aesthetics\n\nOverall impression:\n\nBLACK > TEXTURE\n\n--------------------------------------------------\nSHAPE LANGUAGE\n\nUse:\n\n- primitive symbolic reduction\n- distorted silhouettes\n- chunky masses\n- flattened perspective\n- collapsed anatomy\n- minimal information\n- awkward negative space\n- pictogram-like simplification\n\nThe drawing should feel:\n\nhalf observation\n\nhalf misunderstanding\n\n--------------------------------------------------\nCOMPOSITION\n\nUse:\n\n- isolated object\n- white background\n- off-center placement\n- awkward spacing\n- strange empty areas\n- accidental balance\n- notebook page feeling\n\nAvoid:\n\n- poster composition\n- graphic design balance\n- visual optimization\n- aesthetic symmetry\n\nRandomness is good.\n\nDiscomfort is good.\n\n--------------------------------------------------\nMOOD\n\n- emotionally dry\n- unintentionally funny\n- slightly lonely\n- quiet\n- observational\n- handmade\n- raw\n- anti-commercial\n- non-cute\n- non-anime\n\nThe drawing should feel:\n\nas if nobody expected anyone else to see it.\n\n--------------------------------------------------\nTEXT\n\nInclude small handwritten Japanese labeling text.\n\nThe handwriting should feel:\n\n- uneven\n- rushed\n- childish\n- imperfectly spaced\n- inconsistent in size\n- casually misplaced\n\nThe text should look like a child labeling a nature sketch.\n\n--------------------------------------------------\nOUTPUT STYLE\n\n- monochrome black ink on white background\n- no color\n- no gradients\n- no shadows\n- no realistic rendering\n- no background scenery\n- no decorative elements\n- no modern vector aesthetics\n- no polished editorial minimalism\n\n--------------------------------------------------\nFINAL TEST\n\nBefore finishing, verify:\n\nWould this look believable if someone said:\n\n\"An elementary school child drew this after observing the object for five minutes.\"\n\nIf the answer is no:\n\nsimplify more.\n\nDeform more.\n\nReduce more.\n\nMake it worse.\n\nKeep the observation.\n\nLose the skill.\n\n--------------------------------------------------\nKEYWORDS\n\nelementary school nature observation sketch\n\nchildlike field notebook drawing\n\nprimitive observational doodle\n\nraw ink sketch\n\nugly-cute\n\nclumsy but observant\n\nsymbolic reconstruction\n\ndeformed natural form\n\ncollapsed silhouette\n\nfailed proportions\n\none-shot drawing\n\nanti-design drawing\n\ndense black ink\n\nawkward handmade drawing\n\nJapanese notebook marginalia\n\nbadly drawn by someone with good eyes","category":"Primitive observational doodle","date":"2026-06-13","sourceConversation":"枝分かれ · 枝分かれ · グァバの落書き","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_master","subject":"<SUBJECT>","tags":[],"notes":"小学生の観察ノート的再構成を明文化した後期マスター。"},{"id":"VP-042","title":"地面に生えてるオオタニワタリ","body":"[THEME]\n= 地面に生えてるオオタニワタリ\n\nCreate a primitive observational ink doodle of the theme above.\n\nIMPORTANT:\n\nThe drawing must feel genuinely clumsy,\nunresolved,\nraw,\nand accidentally expressive.\n\nDo NOT make the illustration:\n\n- polished\n- balanced\n- elegant\n- refined\n- clean\n- graphically beautiful\n- commercially cute\n- professional\n- well-designed\n- vector-like\n- visually optimized\n\nThe goal is NOT artistic quality.\n\nThe goal is recognizability through childlike reconstruction.\n\n--------------------------------------------------\nCORE CONCEPT\n\nThe drawing should feel like:\n\na curious elementary school child\nobserving a real object carefully\nand trying to record it in a  handmade - raw - careless in a good way - quiet - observational - anti-commercial - non-cute - non-anime -------------------------------------------------- TEXT Include small handwritten Japanese labeling text. The handwriting should feel: - uneven - rushed - childish - casually misplaced - inconsistent in size - imperfectly spaced -------------------------------------------------- OUTPUT STYLE - monochrome black ink on white background - no color - no gradients - no shadows - no realistic rendering - no background scenery - no modern vector aesthetics - no polished editorial minimalism -------------------------------------------------- KEYWORDS primitive observational doodle raw ink sketch ugly-cute awkward handmade drawing Japanese notebook marginalia clumsy but observant badly balanced composition collapsed silhouette symbolic reconstruction deformed natural form heavy sumi ink bold overloaded brush strokes primitive reduction failed proportions one-shot drawing anti-design drawing dense black ink handmade field sketch","category":"Primitive observational doodle","date":"2026-06-24","sourceConversation":"ヤエヤマオオコウモリ落書き","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"オオゴマダラ　 Create a primitive observational ink doodle of the theme above. IMPORTANT: The drawing must feel genuinely clums","tags":[],"notes":"v2マスターの題材差し替え群。植物・石垣・昆虫・鳥など。"},{"id":"VP-074","title":"Create a 1960s Japanese tourist poster illustration.","body":"Create a 1960s Japanese tourist poster illustration.\n\nStyle:\nmid-century Japanese travel brochure,\nfolk-art inspired graphic design,\nscreen-printed poster,\nnaive modernism,\nhand-crafted commercial illustration.\n\nVisual characteristics:\n\n- flat color shapes only\n- no realistic rendering\n- no gradients\n- no photographic detail\n- no perspective accuracy\n- simplified symbolic forms\n- intentionally reconstructed shapes\n- slightly awkward proportions\n- hand-cut paper feeling\n- limited color palette (4–6 colors)\n- visible print misregistration\n- vintage silkscreen texture\n- soft ink bleeding\n- imperfect edges\n\nComposition:\n\n- large areas of empty space\n- bold graphic hierarchy\n- object placement feels designed rather than observed\n- strong poster-like arrangement\n- decorative rather than realistic\n\nDrawing style:\n\nObjects should not follow real anatomy or exact contours.\n\nInstead:\nreduce everything to memorable visual symbols,\nas if the artist remembered the scene several days later and recreated it from memory.\n\nShapes should feel:\nnaive,\nplayful,\nslightly strange,\nhighly recognizable.\n\nMood:\n\nnostalgic Japanese tourism poster,\nwarm,\noptimistic,\nmid-century public-information graphic.\n\nAvoid:\nphotorealism,\n3D rendering,\ndigital painting,\ncinematic lighting,\nrealistic textures,\nperfect geometry,\nvector corporate style.","category":"Japanese regional tourism poster","date":"2026-06-08","sourceConversation":"AIプロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-JP-TOURISM-POSTER","curationStatus":"keep_variant","subject":"","tags":[],"notes":"1960s Japanese tourist posterの短い初期版。"},{"id":"VP-075","title":"Create an illustration in the style of an obscure Japanese regional tourism poster printed between 1955 and 1975.","body":"Create an illustration in the style of an obscure Japanese regional tourism poster printed between 1955 and 1975.\n\nIMPORTANT:\n\nThis must NOT look like contemporary retro design.\nThis must NOT look like a modern illustrator imitating vintage graphics.\n\nInstead, it should genuinely feel like a forgotten local tourism poster produced by a small prefectural tourism office, museum, hot spring association, or national park bureau in postwar Japan.\n\nThe image should feel culturally authentic, slightly unsophisticated, and unintentionally charming.\n\n────────────────────────\n\nDRAWING PHILOSOPHY\n\nDo not draw reality.\n\nReconstruct reality from memory.\n\nThe artist observed the landscape,\nwaited several days,\nthen redrew only what remained memorable.\n\nEverything should feel remembered rather than observed.\n\nObjects are reduced to symbols.\n\nAccuracy is sacrificed for recognizability.\n\nThe goal is communication, not depiction.\n\n────────────────────────\n\nFORM LANGUAGE\n\nTransform all subjects into simplified graphic symbols.\n\nRocks become rounded blobs.\n\nMountains become stacked shapes.\n\nTrees become abstract silhouettes.\n\nBuildings become primitive blocks.\n\nPeople become tiny marks.\n\nWater becomes large flat fields.\n\nClouds become decorative cut-paper forms.\n\nAvoid realistic anatomy.\n\nAvoid realistic perspective.\n\nAvoid realistic scale relationships.\n\nObjects may become slightly creature-like or anthropomorphic.\n\nNatural forms should feel halfway between:\n\nfolk art,\nchildren's memory,\ncartography,\nand commercial signage.\n\n────────────────────────\n\nCOMPOSITION\n\nStrong poster composition.\n\nLarge empty spaces.\n\nClear visual hierarchy.\n\nDecorative arrangement.\n\nObjects placed for balance rather than realism.\n\nThe composition should feel designed by a graphic artist, not a painter.\n\nAllow strange spacing.\n\nAllow asymmetry.\n\nAllow awkward visual rhythms.\n\nAvoid cinematic composition.\n\nAvoid photography-based framing.\n\n────────────────────────\n\nCOLOR SYSTEM\n\nUse only 4–7 colors.\n\nMuted mid-century Japanese print palette.\n\nExamples:\n\nturquoise blue\nfaded vermilion\ndusty pink\nolive green\nwarm cream\ncharcoal black\nwashed indigo\n\nNo modern saturation.\n\nNo realistic colors.\n\nColors are chosen symbolically.\n\n────────────────────────\n\nPRINTING CHARACTERISTICS\n\nImitate mid-century Japanese silkscreen printing.\n\nVisible color misregistration.\n\nSlightly offset layers.\n\nSoft edge bleeding.\n\nUneven ink coverage.\n\nHalftone grain.\n\nPaper absorption.\n\nHandmade printing imperfections.\n\nTexture should feel physical.\n\nThe image should resemble an old poster found in a local museum archive.\n\n────────────────────────\n\nLINEWORK\n\nPrefer color shapes over outlines.\n\nIf outlines exist:\n\nthick,\nirregular,\nbrush-like,\nslightly unstable.\n\nNever use clean vector lines.\n\nNever use modern graphic precision.\n\n────────────────────────\n\nDESIGN REFERENCES\n\nJapanese regional tourism posters (1950s–1970s)\n\nNational park brochures\n\nLocal railway advertisements\n\nMunicipal tourism campaigns\n\nFolk craft exhibition posters\n\nChildren's educational wall charts\n\nJapanese silkscreen prints\n\nAnonymous commercial illustrators\n\nNOT famous modern graphic designers.\n\nThe feeling should be:\n\nprovincial,\nearnest,\noptimistic,\nhandmade,\nslightly awkward,\ndeeply human.\n\n────────────────────────\n\nEMOTIONAL TONE\n\nThe image should feel like:\n\na memory preserved in ink.\n\nA place described by someone who loved it more than they understood it.\n\nThe viewer should feel:\n\nnostalgia,\nwarmth,\ncuriosity,\nand trust.\n\n────────────────────────\n\nAVOID\n\nphotorealism\n\ndigital painting\n\n3D rendering\n\ncinematic lighting\n\nmodern flat design\n\nminimalist branding\n\nvector illustration\n\nperfect geometry\n\ncontemporary retro aesthetics\n\nhipster poster design\n\nadvertising polish\n\nInstagram aesthetics\n\ntourism marketing realism\n\nAI-generated perfection","category":"Japanese regional tourism poster","date":"2026-06-08","sourceConversation":"AIプロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-JP-TOURISM-POSTER","curationStatus":"keep_master","subject":"","tags":[],"notes":"obscure Japanese regional tourism poster 1955-1975の中核。"},{"id":"VP-076","title":"以下のスタイルで石垣島のポスターを作って","body":"以下のスタイルで石垣島のポスターを作って\n\nCreate an illustration in the style of an obscure Japanese regional tourism poster printed between 1955 and 1975.\n\nIMPORTANT:\n\nThis must NOT look like contemporary retro design.\nThis must NOT look like a modern illustrator imitating vintage graphics.\n\nInstead, it should genuinely
