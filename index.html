<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Lineage Library</title>
    <style>
:root {
  color-scheme: light;
  --bg: #f6f7f3;
  --panel: #ffffff;
  --panel-soft: #f0f4f0;
  --ink: #1d2320;
  --muted: #69736f;
  --line: #dce2dc;
  --accent: #1e6f68;
  --accent-strong: #11524d;
  --amber: #9a5b13;
  --red: #a63a3a;
  --blue: #345f9f;
  --shadow: 0 16px 38px rgba(35, 45, 40, 0.11);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  overflow: auto;
}

body.app-ready {
  overflow: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 7px;
  min-height: 34px;
  padding: 0 12px;
  cursor: pointer;
}

button:hover {
  border-color: #a8b6ae;
  background: #f8faf8;
}

button.primary,
.top-actions button:first-child {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

button.danger {
  color: var(--red);
  border-color: #e3b9b9;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 7px;
  padding: 8px 10px;
}

textarea {
  resize: vertical;
  min-height: 76px;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: visible;
}

body.app-ready .app-shell {
  height: 100vh;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.86);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 5;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.brand > div {
  min-width: 0;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 7px;
  background: #1f2d2a;
  color: #d8efe8;
  font-weight: 800;
  letter-spacing: 0;
}

h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.15;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.brand p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.top-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.toolbar {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) 150px 150px 210px 130px 130px;
  gap: 10px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfa;
}

label span,
.field-label {
  display: block;
  margin-bottom: 5px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.workspace {
  display: grid;
  grid-template-columns: minmax(300px, 35vw) 1fr;
  min-height: 0;
  overflow: hidden;
}

.library-pane {
  border-right: 1px solid var(--line);
  background: #eef2ee;
  min-height: 0;
  display: grid;
  grid-template-rows: auto 1fr;
}

.pane-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid var(--line);
}

.prompt-list {
  overflow: auto;
  padding: 8px;
}

.prompt-row {
  width: 100%;
  text-align: left;
  display: grid;
  gap: 6px;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 7px;
  padding: 10px;
  min-height: auto;
}

.prompt-row:hover {
  background: rgba(255, 255, 255, 0.62);
}

.prompt-row.active {
  background: #fff;
  border-color: #a9c7bd;
  box-shadow: 0 6px 18px rgba(30, 111, 104, 0.12);
}

.row-main {
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-width: 0;
}

.prompt-id {
  flex: 0 0 auto;
  color: var(--accent-strong);
  font-weight: 800;
  font-size: 12px;
}

.prompt-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 650;
}

.row-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
}

.list-meta {
  display: grid;
  grid-template-columns: 88px 58px 64px minmax(0, 1fr) minmax(0, 1fr);
  gap: 6px;
  align-items: center;
  overflow: hidden;
  flex-wrap: nowrap;
}

.list-meta .chip {
  justify-content: center;
  width: 100%;
}

.chip-placeholder {
  visibility: hidden;
}

.meta-category,
.meta-parent {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chip {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  min-height: 22px;
  border-radius: 7px;
  padding: 2px 7px;
  border: 1px solid var(--line);
  background: #fff;
  color: #405049;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chip.master {
  border-color: #bfd7c0;
  color: #1f612c;
  background: #eff8ef;
}

.chip.review {
  border-color: #e6cf9f;
  color: var(--amber);
  background: #fff8eb;
}

.chip.archive {
  border-color: #e5bbbb;
  color: var(--red);
  background: #fff3f3;
}

.detail-pane {
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  background: var(--panel);
  display: grid;
  grid-template-rows: auto 1fr;
}

.tabs {
  display: flex;
  gap: 4px;
  padding: 10px 12px 0;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.tab {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
  border-bottom-color: transparent;
  background: transparent;
}

.tab.active {
  background: #f7faf7;
  color: var(--accent-strong);
  border-color: var(--line);
  border-bottom-color: #f7faf7;
  transform: translateY(1px);
}

.tab-panel {
  display: none;
  min-height: 0;
  overflow: auto;
  padding: 18px;
  background: #f7faf7;
}

.tab-panel.active {
  display: block;
}

.detail-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 310px;
  gap: 16px;
  align-items: start;
}

.surface {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.surface.pad {
  padding: 16px;
}

.detail-title {
  display: grid;
  grid-template-columns: minmax(0, 1fr) max-content;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}

.detail-title > div {
  min-width: 0;
}

.detail-title h2 {
  margin: 0;
  font-size: 22px;
  line-height: 1.22;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.detail-actions button {
  min-width: 88px;
}

.body-text {
  white-space: pre-wrap;
  font-family:
    "SFMono-Regular", Consolas, "Liberation Mono", ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.6;
  background: #fbfbf8;
  border-top: 1px solid var(--line);
  margin: 0 -16px -16px;
  padding: 16px;
  max-height: 58vh;
  overflow: auto;
}

.field-stack {
  display: grid;
  gap: 12px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.lineage-layout,
.export-layout {
  display: grid;
  gap: 16px;
}

.lineage-tools,
.export-actions {
  display: flex;
  align-items: end;
  gap: 10px;
  flex-wrap: wrap;
}

.lineage-tools label {
  min-width: 260px;
  flex: 1;
}

.tree {
  margin: 0;
  padding: 10px 0 10px 20px;
  line-height: 1.45;
}

.tree ul {
  margin: 4px 0 4px 18px;
  padding: 0;
  border-left: 1px solid var(--line);
}

.tree li {
  list-style: none;
  margin: 0;
  padding: 4px 0 4px 10px;
}

.tree-node-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 92px;
  gap: 8px;
  align-items: center;
}

.tree button {
  width: 100%;
  min-width: 0;
  min-height: 28px;
  padding: 0 8px;
  text-align: left;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tree .selected-node {
  border-color: var(--accent);
  color: var(--accent-strong);
  background: #eef8f5;
  font-weight: 700;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 10px;
}

.stat {
  padding: 12px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.stat b {
  display: block;
  font-size: 22px;
}

.stat span {
  color: var(--muted);
  font-size: 12px;
}

.empty-state {
  display: grid;
  place-items: center;
  align-content: center;
  min-height: 50vh;
  color: var(--muted);
  text-align: center;
}

.empty-state h2 {
  margin: 0 0 6px;
  color: var(--ink);
}

.muted {
  color: var(--muted);
}

@media (max-width: 1180px) {
  .toolbar {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .search-box {
    grid-column: 1 / -1;
  }
}

@media (max-width: 920px) {
  .workspace,
  .detail-grid {
    grid-template-columns: 1fr;
  }

  .workspace {
    grid-template-rows: minmax(160px, 44vh) minmax(0, 1fr);
  }

  .library-pane {
    border-right: 0;
    border-bottom: 1px solid var(--line);
    max-height: none;
  }
}

@media (max-width: 680px) {
  .toolbar {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .workspace {
    grid-template-rows: minmax(120px, 28vh) minmax(0, 1fr);
  }
}

@media (max-width: 360px) {
  .toolbar {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 560px) {
  .topbar {
    align-items: center;
    flex-direction: row;
  }

  .detail-title {
    grid-template-columns: 1fr;
  }

  .detail-actions,
  .two-col,
  .stats-grid {
    width: 100%;
    grid-template-columns: 1fr;
  }

  .top-actions {
    flex: 0 0 auto;
    flex-wrap: nowrap;
  }

  .top-actions button {
    min-width: 50px;
    padding: 0 8px;
  }

  .detail-actions button {
    flex: 1;
  }
}

    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">PL</span>
          <div>
            <h1>Prompt Lineage Library</h1>
            <p id="saveState">未読み込み</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="copyCurrentBtn" type="button" title="現在のプロンプトをコピー">Copy</button>
          <button id="exportJsonBtn" type="button" title="JSONを書き出し">JSON</button>
          <button id="exportCsvBtn" type="button" title="CSVを書き出し">CSV</button>
        </div>
      </header>

      <section class="toolbar" aria-label="検索と絞り込み">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="title, body, tag, note..." autocomplete="off" />
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter"></select>
        </label>
        <label>
          <span>Confidence</span>
          <select id="confidenceFilter"></select>
        </label>
        <label>
          <span>Root</span>
          <select id="rootFilter"></select>
        </label>
        <label>
          <span>Archive</span>
          <select id="archiveFilter">
            <option value="active">active</option>
            <option value="all">all</option>
            <option value="archived">archived</option>
          </select>
        </label>
        <label>
          <span>Sort</span>
          <select id="sortSelect">
            <option value="id">ID</option>
            <option value="date_desc">date desc</option>
            <option value="status">status</option>
            <option value="root">root</option>
          </select>
        </label>
      </section>

      <main class="workspace">
        <aside class="library-pane" aria-label="プロンプト一覧">
          <div class="pane-head">
            <strong id="resultCount">0 prompts</strong>
            <button id="reviewBtn" type="button">Review</button>
          </div>
          <div id="promptList" class="prompt-list"></div>
        </aside>

        <section class="detail-pane" aria-label="プロンプト詳細">
          <nav class="tabs" aria-label="表示切替">
            <button class="tab active" type="button" data-tab="detail">Detail</button>
            <button class="tab" type="button" data-tab="lineage">Lineage</button>
            <button class="tab" type="button" data-tab="export">Import / Export</button>
          </nav>

          <div id="detailTab" class="tab-panel active"></div>
          <div id="lineageTab" class="tab-panel"></div>
          <div id="exportTab" class="tab-panel"></div>
        </section>
      </main>
    </div>

    <template id="emptyTemplate">
      <div class="empty-state">
        <h2>プロンプトを選択してください</h2>
        <p>左の一覧または検索結果から開けます。</p>
      </div>
    </template>

    <input id="importFile" type="file" accept="application/json,.json" hidden />
    <script>
window.PROMPT_LINEAGE_SEED = {"version":"0.2","generated_from":"HIROSHI_SATO_Prompt_Corpus_Index.csv","roots":[{"id":"ROOT-UX-STORYBOARD","name":"Japanese UX Storyboard Illustration","description":"Japanese UX/service storyboard image-generation style: flat vector, service-design presentation rhythm, emotional user journey panels."},{"id":"ROOT-PRIMITIVE-DOODLE","name":"Primitive Observational Ink Doodle","description":"Reusable primitive observational doodle styles, including childlike reconstruction, animal-character variants, and silhouette reduction."},{"id":"ROOT-JP-TOURISM-POSTER","name":"Obscure Japanese Regional Tourism Poster","description":"Postwar Japanese regional tourism poster style with memory-based composition, unsophisticated charm, and local publication texture."},{"id":"ROOT-FLAT-VECTOR","name":"Flat Vector / Paper-Cut Reduction","description":"No-outline flat vector and paper-cut landscape reduction styles using large shapes, limited palettes, and simplified spatial structure."},{"id":"ROOT-CONCEPTUAL-DIAGRAM","name":"Minimalist Conceptual Diagram / UX Sketch","description":"Minimal hand-drawn conceptual diagram style for systems, UX, philosophy, and explanatory image generation."},{"id":"ROOT-ABSTRACT-COVER","name":"Editorial Cover / Abstract Visual Systems","description":"Reusable editorial cover systems: cultural magazine covers, literary landscapes, folk silhouettes, and abstract wide banners."},{"id":"ROOT-LOGO-TYPO","name":"Logo / Typography / Letterform","description":"Reusable visual prompt styles for typographic and letterform image generation."},{"id":"ROOT-HANDDRAWN-CUTE-VEHICLE","name":"Rounded Hand-Drawn Friendly Illustration","description":"Compact rounded hand-drawn illustration style with uneven lines, bright simple colors, and friendly handmade characters."},{"id":"ROOT-HANDWRITTEN-PHOTO-ANNOTATION","name":"Handwritten Photo Annotation","description":"Photo annotation image style using thin hand-drawn white lines, arrows, diary-like Japanese comments, and relaxed editorial marks."}],"prompts":[{"id":"VP-002","title":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.","body":"Create a Japanese UX service storyboard illustration in a modern flat vector presentation style.\n\nThe composition should resemble a startup/service-design presentation slide used by Japanese UX consultancies between 2019–2024.\n\nSTYLE:\n- Minimal flat vector illustration\n- White background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Characters are symbolic and emotional rather than detailed\n- Simplified facial expressions with dot eyes and tiny mouths\n- Friendly but informational\n- Calm, trustworthy atmosphere\n- Mix of infographic, editorial layout, and storyboard\n- Large use of whitespace\n- Floating information blocks instead of rigid panels\n- Japanese SaaS / healthcare / lifestyle app aesthetic\n\nLAYOUT:\n- Explain a service through emotional progression\n- Show: user anxiety → service intervention → emotional relief\n- Use arrows, floating UI cards, speech bubbles, icons, and mini-scenes\n- Include simplified mobile app UI mockups\n- Multiple small scenes inside one canvas\n- Presentation-slide composition rather than comic panels\n\nTEXT STYLE:\n- Soft conversational Japanese tone\n- Emotional but understated\n- Everyday-life wording\n- Avoid aggressive marketing tone\n\nCOLOR PALETTE:\n- White base\n- Desaturated teal, mint, soft blue, light gray\n- Minimal number of colors\n- Warm and reassuring\n\nILLUSTRATION STYLE:\n- Flat geometric shapes\n- No texture\n- No realism\n- No dramatic shading\n- Soft rounded forms\n- Modern Japanese explanatory illustration style\n\nMOOD:\n- gentle\n- reassuring\n- emotionally intelligent\n- practical\n- human-centered\n- optimistic but calm\n\nThe final image should feel like a service concept storyboard used in a Japanese startup pitch deck or UX strategy presentation.","category":"UX storyboard / manga","date":"2026-05-11","sourceConversation":"ストーリーボード分析","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"日本UXサービスストーリーボードの汎用マスター。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-003","title":"Create a 6-panel Japanese UX storyboard manga in a modern flat vector presentation style.","body":"Create a 6-panel Japanese UX storyboard manga in a modern flat vector presentation style.\n\nThe storyboard should visually explain a social/design/service idea through emotional progression and simple narrative scenes.\n\nSTRUCTURE:\nThe storyboard must contain exactly 6 panels arranged in a clean grid layout.\n\nPanel structure:\n1. User pain / anxiety\n2. Solution idea step 1\n3. Solution idea step 2\n4. Solution idea step 3\n5. Solution idea step 4\n6. Ideal future / transformed society\n\nThe story should feel like a Japanese startup UX strategy storyboard or service design presentation slide.\n\nSTYLE:\n- Minimal flat vector illustration\n- White or very light warm-gray background\n- Soft pastel accent colors\n- Thin or no outlines\n- Rounded simple characters\n- Simplified facial expressions\n- Calm and emotionally intelligent atmosphere\n- Friendly but analytical\n- Modern Japanese SaaS / UX consultancy aesthetic\n- Mix of infographic, editorial layout, and storyboard manga\n- Large whitespace\n- Floating information blocks and icons\n- Soft shadows only if minimal\n- No realism\n- No heavy manga effects\n- No dramatic action composition\n\nCHARACTERS:\n- 2–4 head-tall simplified human characters\n- Symbolic emotional expressions\n- Gentle and observational mood\n- Everyday clothing\n- Characters represent ordinary people, designers, researchers, or citizens\n\nLAYOUT:\n- Each panel should contain:\n  - a small title/header\n  - one main scene\n  - supporting UI elements, icons, speech bubbles, arrows, or notes\n- Use clean visual hierarchy\n- Avoid clutter\n- Panels should feel like “UX explanation scenes” rather than entertainment manga\n\nCOLOR PALETTE:\n- Desaturated teal\n- Soft mint green\n- Pale blue\n- Warm gray\n- Muted beige\n- Minimal number of colors\n- Calm and trustworthy tone\n\nTEXT STYLE:\n- Japanese text\n- Conversational but thoughtful tone\n- Avoid aggressive marketing language\n- Slightly intellectual and reflective\n- Explain emotional or societal value clearly\n\nMOOD:\n- human-centered\n- thoughtful\n- optimistic but calm\n- socially reflective\n- quietly hopeful\n- culturally grounded\n\nIMPORTANT:\nThe storyboard should explain:\n- a social problem or emotional tension\n- how the idea gradually intervenes\n- how accumulated small actions create broader societal impact\n- a future where humans and systems coexist more meaningfully\n\nTOPIC VARIABLES (replace each time):\n\n[HMW_QUESTION]\n= 「ここに課題を書く」\n\n[SOLUTION_IDEA]\n= 「ここにアイデアを書く」\n\n[PANEL_1_PAIN]\n= 「ユーザーの不安や困りごと」\n\n[PANEL_2]\n= 「ソリューション1」\n\n[PANEL_3]\n= 「ソリューション2」\n\n[PANEL_4]\n= 「ソリューション3」\n\n[PANEL_5]\n= 「ソリューション4」\n\n[PANEL_6_FUTURE]\n= 「理想的な未来」\n\nThe generated storyboard should visually and emotionally express the following:\n\nHMW:\n[HMW_QUESTION]\n\nIDEA:\n[SOLUTION_IDEA]\n\nPanel details:\n1. [PANEL_1_PAIN]\n2. [PANEL_2]\n3. [PANEL_3]\n4. [PANEL_4]\n5. [PANEL_5]\n6. [PANEL_6_FUTURE]","category":"UX storyboard / manga","date":"2026-05-11","sourceConversation":"ストーリーボード分析","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":["layer_2"],"notes":"6パネル型に構造化された中核マスター。\nLayer 2 style variation retained under VP-002 by 2026-06-28 pruning pass."},{"id":"VP-004","title":"[HMW_QUESTION]","body":"[HMW_QUESTION]\n= 「ここに課題を書く」\n\n[SOLUTION_IDEA]\n= 「ここにソリューションを書く」\n\n\nCreate a 6-panel Japanese UX storyboard manga based on the following challenge and solution idea.\n\nHMW:\n[HMW_QUESTION]\n\nSOLUTION:\n[SOLUTION_IDEA]\n\n\nThe storyboard should visually explain the emotional journey from social problem to hopeful future through a calm, intelligent, human-centered narrative.\n\nSTRUCTURE:\nGenerate exactly 6 panels in a clean storyboard grid.\n\nPanel flow:\n1. User pain / anxiety caused by the problem\n2. First interaction with the solution idea\n3. Investigating / trying / building the solution\n4. Sharing / expanding / operationalizing the solution\n5. Accumulated impact / social recognition / proof\n6. Ideal future created by the solution\n\nThe narrative should naturally infer the details of each panel from the HMW question and solution idea.\nDo not require additional panel instructions from the user.\n\nSTYLE:\n- Japanese startup UX storyboard aesthetic\n- Minimal flat vector illustration\n- White or soft warm-gray background\n- Soft pastel accent colors\n- Rounded simple characters\n- Thin or no outlines\n- Friendly but analytical atmosphere\n- Editorial infographic + storyboard manga hybrid\n- Calm and emotionally intelligent\n- Large whitespace\n- Floating information blocks\n- Simple icons and UI mockups\n- No realism\n- No heavy manga action style\n- No dramatic perspective\n\nCHARACTERS:\n- Simplified 2–4 head-tall human figures\n- Symbolic facial expressions\n- Ordinary people, designers, citizens, researchers, workers\n- Soft emotional nuance rather than exaggerated reactions\n\nLAYOUT:\nEach panel should contain:\n- Small Japanese title/header\n- One main visual scene\n- Supporting speech bubbles, arrows, icons, notes, or UI snippets\n- Clear visual hierarchy\n- Easy-to-understand flow\n\nCOLOR PALETTE:\n- Desaturated teal\n- Soft mint\n- Pale blue\n- Warm gray\n- Muted beige\n- Minimal number of colors\n- Trustworthy and calm tone\n\nTEXT STYLE:\n- Japanese text\n- Conversational and reflective\n- Slightly intellectual\n- Soft emotional tone\n- Avoid aggressive advertising language\n- Explain emotional and social value clearly\n\nMOOD:\n- thoughtful\n- human-centered\n- socially reflective\n- quietly optimistic\n- culturally grounded\n- practical but hopeful\n\nIMPORTANT:\nThe storyboard should feel like:\n- a Japanese UX consultancy presentation\n- a startup pitch storyboard\n- a service design concept sheet\n- an editorial explanatory manga\n\nThe final image should communicate:\n- why the problem matters emotionally\n- how the solution gradually intervenes\n- how small actions accumulate into social value\n- how human meaning becomes visible through the process\n\nInspired by:\nJapanese service design storyboards,\neditorial infographics,\nstartup pitch illustrations,\nand modern Japanese explanatory manga aesthetics from 2019–2025.","category":"UX storyboard / manga","date":"2026-05-11","sourceConversation":"ストーリーボード分析","duplicateCount":1,"lineageRoot":"ROOT-UX-STORYBOARD","curationStatus":"keep_variant","subject":"","tags":["layer_2"],"notes":"HMW/SOLUTION/PANEL変数を持つ入力フォーム型。\nLayer 2 style variation retained under VP-002 by 2026-06-28 pruning pass."},{"id":"VP-015","title":"[STYLE THEME]","body":"[STYLE THEME]\nMinimal naïve Japanese doodle illustration / local zine sketch aesthetic / childlike-but-designed symbolic drawing language\n\nCreate illustrations in the exact spirit of handmade Japanese marginal doodles found in personal notebooks, local newsletters, tiny independent publications, island community maps, or handwritten signage.\n\nThe drawings should feel:\n- improvised\n- emotionally warm\n- slightly awkward\n- unintentionally funny\n- icon-like\n- handmade rather than “illustrated”\n- somewhere between children’s drawings and sophisticated graphic reduction\n\nIMPORTANT:\nThe goal is NOT polished illustration.\nThe goal is NOT manga.\nThe goal is NOT modern flat vector branding.\nThe goal is a strangely balanced mix of:\nprimitive + observant + symbolic + affectionate.\n\n--------------------------------------------------\n[LINE STYLE]\n- thick black hand-drawn lines\n- visible wobble and instability\n- uneven pressure\n- slightly dry-brush feeling\n- imperfect curves\n- occasional asymmetry\n- lines should feel quickly drawn in one stroke\n- avoid geometric perfection\n- avoid clean Bézier curves\n- intentionally inconsistent proportions\n\nThe linework should resemble:\n- marker pen\n- brush pen\n- cheap felt-tip pen\n- casual notebook sketching\n\n--------------------------------------------------\n[FORM LANGUAGE]\n- extremely simplified shapes\n- almost pictogram-level reduction\n- rounded silhouettes\n- minimal anatomy\n- faces made from dots and tiny mouths\n- tiny eyes placed far apart\n- bodies simplified into blobs, ovals, triangles, or capsules\n- animals reduced to “recognizable essence only”\n- details omitted aggressively\n\nEvery object should feel:\n“the minimum amount of information needed to recognize it.”\n\n--------------------------------------------------\n[COMPOSITION]\n- large empty space\n- floating disconnected elements\n- uneven spacing\n- playful imbalance\n- no strict alignment\n- awkward placement is GOOD\n- visual rhythm should feel accidental but charming\n\nElements may appear:\n- isolated\n- partially cropped\n- randomly scaled\n- casually scattered like notebook margins\n\n--------------------------------------------------\n[CHARACTER DESIGN]\nCharacters should feel:\n- innocent\n- emotionally neutral\n- quietly humorous\n- slightly vacant\n- unintentionally cute\n\nExpressions:\n- tiny smiles\n- blank stares\n- simple dots\n- no dramatic emotion\n\nAvoid:\n- expressive anime faces\n- dynamic poses\n- polished mascot energy\n\n--------------------------------------------------\n[OBJECT & ANIMAL RULES]\nAnimals and objects should be reduced into:\n- chunky symbolic silhouettes\n- strange but lovable simplifications\n- uneven symmetry\n- childlike observational abstraction\n\nExamples:\n- bird = rounded blob + beak\n- turtle = dome + tiny legs\n- cat = flat face + whiskers\n- flower = symbolic petal cluster\n- tree = single irregular mass\n- human = bean-shaped body + tiny limbs\n\n--------------------------------------------------\n[TEXT STYLE]\nIf text appears:\n- handwritten Japanese\n- uneven character size\n- casual annotation feeling\n- imperfect spacing\n- looks written directly beside the doodles\n\n--------------------------------------------------\n[TEXTURE]\n- monochrome black ink only\n- plain white or light gray background\n- no gradients\n- no shadows\n- no realistic texture\n- optional slight ink bleed or scan noise\n\n--------------------------------------------------\n[OVERALL MOOD]\nThe image should feel like:\n- a personal sketchbook\n- a tiny local museum pamphlet\n- island community doodles\n- notes from a wandering observer\n- a handmade visual diary\n- playful but not loud\n- poetic through simplicity\n\nThe humor should emerge naturally from reduction and awkwardness, not from explicit jokes.\n\n--------------------------------------------------\n[NEGATIVE PROMPT]\nNO:\n- polished vector graphics\n- corporate illustration\n- anime rendering\n- realistic anatomy\n- detailed shading\n- perspective accuracy\n- glossy mascot design\n- modern UI illustration style\n- symmetry perfection\n- clean digital curves\n- highly expressive cartoon acting\n- colorful pop aesthetics","category":"Primitive observational doodle","date":"2026-05-20","sourceConversation":"AIイラストスタイル再現","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"","tags":["layer_2"],"notes":"Minimal naïve Japanese doodle期。後のprimitive observational doodleの前段。\nLayer 2 style variation retained under VP-021 by 2026-06-28 pruning pass."},{"id":"VP-021","title":"[THEME] Primitive observational ink doodle master","body":"[THEME] = <SUBJECT>\n\nCreate a primitive observational ink doodle of the theme above.\n\nIMPORTANT:\nThe drawing must feel genuinely clumsy, unresolved, raw, and accidentally expressive.\n\nDo NOT make the illustration:\n- polished\n- balanced\n- elegant\n- refined\n- clean\n- graphically beautiful\n- commercially cute\n- vector-like\n- visually optimized\n\nThe image should feel like:\n- a notebook marginal doodle\n- a rushed observational memo\n- a handmade local zine sketch\n- an accidental drawing made during field observation\n- a badly drawn but strangely perceptive nature sketch\n\nThe artist should feel like:\nsomeone who observes nature extremely carefully,\nbut redraws reality through careless simplification and primitive reconstruction.\n\nThe charm comes from:\n- awkward proportions\n- collapsed forms\n- primitive reduction\n- asymmetry\n- failed anatomy\n- unstable silhouette\n- accidental imbalance\n- uncomfortable spacing\n- strange simplification\n- rushed execution\n- observational sharpness surviving inside bad drawing\n\nThe drawing should feel:\n“surprisingly observant despite being badly drawn.”\n\n--------------------------------------------------\nVERY IMPORTANT STYLE UPDATE\n\nThe forms should NOT closely follow real anatomy or realistic outer contours.\n\nInstead:\n- reconstruct the object into simplified symbolic masses\n- aggressively deform proportions\n- compress or stretch parts unnaturally\n- simplify curves into blunt awkward shapes\n- partially collapse perspective\n- redraw the object from memory-like perception rather than accuracy\n- allow ugly geometric distortion\n- prioritize expressive reconstruction over faithful depiction\n\nThe object should feel:\nhalf observation,\nhalf symbolic misunderstanding.\n\nDo NOT preserve clean realistic silhouettes.\n\n--------------------------------------------------\nLINE QUALITY\n\nUse:\n- bold black ink only\n- deep saturated sumi-like black\n- thick heavy brush pen strokes\n- dramatic thick-to-thin contrast\n- areas where ink becomes aggressively black and dense\n- occasional overloaded ink blobs\n- rough unstable pressure\n- trembling curves\n- broken awkward contours\n- visible brush direction\n- slightly dirty ink texture\n- scratchy corrections\n- uneven stroke rhythm\n\nIMPORTANT:\nThe thick lines must feel:\n- confidently heavy\n- blackened with dense ink\n- physically loaded with ink\n- almost excessive in weight\n\nAvoid:\n- excessive dry-brush fading\n- overly scratchy full-image texture\n- too much distressed erosion\n- thin elegant calligraphy\n- delicate linework\n\nSome lines may break,\nbut overall the drawing should still feel visually BLACK and ink-heavy.\n\nThe black areas should feel:\nwet,\nphysical,\ndense,\nand uncontrolled.\n\n--------------------------------------------------\nSHAPE LANGUAGE\n\n- extremely simplified forms\n- primitive symbolic reduction\n- distorted silhouettes\n- chunky awkward masses\n- flattened perspective\n- collapsed anatomy\n- minimal information\n- strange negative space\n- almost pictogram-like abstraction\n\nObservation should remain sharp,\neven though the execution feels primitive and partially failed.\n\nThe drawing must feel:\n“badly drawn by someone with good eyes.”\n\n--------------------------------------------------\nCOMPOSITION\n\n- isolated floating object\n- white background\n- awkward placement\n- strange empty gaps\n- slightly off-center\n- accidental notebook composition\n- uncomfortable balance is GOOD\n- random spacing is GOOD\n- avoid poster-like composition\n- avoid design-like harmony\n\n--------------------------------------------------\nMOOD\n\n- emotionally dry\n- unintentionally funny\n- slightly lonely\n- handmade\n- raw\n- careless in a good way\n- quiet\n- observational\n- anti-commercial\n- non-cute\n- non-anime\n\n--------------------------------------------------\nTEXT\n\nInclude small handwritten Japanese labeling text.\n\nThe handwriting should feel:\n- uneven\n- rushed\n- childish\n- casually misplaced\n- inconsistent in size\n- imperfectly spaced\n\n--------------------------------------------------\nOUTPUT STYLE\n\n- monochrome black ink on white background\n- no color\n- no gradients\n- no shadows\n- no realistic rendering\n- no background scenery\n- no modern vector aesthetics\n- no polished editorial minimalism\n\n--------------------------------------------------\nKEYWORDS\n\nprimitive observational doodle\nraw ink sketch\nugly-cute\nawkward handmade drawing\nJapanese notebook marginalia\nclumsy but observant\nbadly balanced composition\ncollapsed silhouette\nsymbolic reconstruction\ndeformed natural form\nheavy sumi ink\nbold overloaded brush strokes\nprimitive reduction\nfailed proportions\none-shot drawing\nanti-design drawing\ndense black ink\nhandmade field sketch","category":"Primitive observational doodle","date":"2026-05-20","sourceConversation":"グァバの落書き","duplicateCount":8,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_master","subject":"グァバ","tags":["layer_1"],"notes":"VERY IMPORTANT STYLE UPDATEを持つ現行寄りの中核マスター。\nLayer 1 master prompt retained by 2026-06-28 pruning pass.\nNormalized from a guava-specific canonical version into a reusable placeholder master."},{"id":"VP-026","title":"（ここにモチーフ名を入れる）","body":"[THEME] = （ここにモチーフ名を入れる）\n\nCreate a primitive observational ink doodle of the theme above.\n\nIMPORTANT:\nThe drawing must feel genuinely clumsy, unresolved, careless, and accidentally expressive.\n\nDo NOT make the illustration:\n- polished\n- balanced\n- elegant\n- refined\n- commercially cute\n- graphically optimized\n- anatomically correct\n- realistic\n- stylish in a modern design sense\n- vector-like\n- aestheticized\n\nThe image should feel like:\n- a notebook marginal doodle\n- a rushed field memo\n- a handmade local zine sketch\n- a strange observational scribble\n- an accidental character drawing\n- a badly drawn but oddly perceptive nature study\n\nThe artist should feel like:\nsomeone who observes nature carefully,\nbut redraws reality through primitive misunderstanding and symbolic reconstruction.\n\nThe charm comes from:\n- awkward proportions\n- failed anatomy\n- simplified symbolic masses\n- ugly deformation\n- collapsed perspective\n- strange spacing\n- unbalanced composition\n- childish reconstruction\n- emotionally dry humor\n- “wrong” simplification\n- blank facial expressions\n- primitive visual logic\n- accidental funny appearance\n\nVERY IMPORTANT:\n\nReduce realism aggressively.\n\nThe object should NOT preserve realistic anatomy or believable silhouette structure.\n\nInstead:\n- reconstruct the subject into blunt symbolic shapes\n- simplify curves into awkward geometry\n- deform proportions heavily\n- stretch or compress body parts unnaturally\n- flatten spatial depth\n- simplify details almost to pictogram level\n- redraw the subject from memory-like misunderstanding\n- allow visual stupidity\n- prioritize expressive failure over correctness\n\nThe result should feel:\nhalf observation,\nhalf symbolic misunderstanding.\n\nThe character should feel:\n- vacant\n- oddly calm\n- unintentionally funny\n- slightly lonely\n- dumb in a charming way\n- emotionally flat\n- handmade\n- anti-commercial\n\n--------------------------------------------------\n\nLINE QUALITY\n\nUse:\n- bold black ink only\n- deep saturated sumi-like black\n- thick brush pen strokes\n- dramatic thick-to-thin contrast\n- overloaded black ink areas\n- visible brush pressure\n- uneven curves\n- wobbling contours\n- scratchy corrections\n- inconsistent line rhythm\n- heavy dark masses\n- occasional ink blobs\n\nIMPORTANT:\nThe lines must feel:\n- physically heavy\n- ink-loaded\n- confidently crude\n- excessive in weight\n- handmade and uncontrolled\n\nAvoid:\n- delicate calligraphy\n- elegant line control\n- clean vector curves\n- sophisticated illustration finish\n- refined brush technique\n\nThe drawing should feel visually BLACK and ink-heavy.\n\n--------------------------------------------------\n\nSHAPE LANGUAGE\n\n- primitive reduction\n- chunky silhouettes\n- pictogram-like abstraction\n- strange empty space\n- asymmetry\n- flat symbolic forms\n- collapsed structure\n- minimal visual information\n- failed but observant simplification\n\nObservation should remain sharp,\neven though the drawing feels primitive and partially incorrect.\n\nThe drawing must feel like:\n“badly drawn by someone with good eyes.”\n\n--------------------------------------------------\n\nCOMPOSITION\n\n- isolated floating object\n- white background\n- awkward placement\n- random empty gaps\n- slightly off-center\n- accidental notebook layout\n- uncomfortable balance is GOOD\n- avoid poster composition\n- avoid graphic design harmony\n\n--------------------------------------------------\n\nTEXT\n\nInclude small handwritten Japanese annotation text.\n\nThe handwriting should feel:\n- rushed\n- uneven\n- childish\n- casually misplaced\n- inconsistent in size\n- imperfectly spaced\n- observational but unnecessary\n\nExamples:\n- 「でかい」\n- 「よるにとぶ」\n- 「たぶんおもい」\n- 「めがちいさい」\n- 「へんなかたち」\n\n--------------------------------------------------\n\nOUTPUT STYLE\n\n- monochrome black ink on white background\n- no color\n- no gradients\n- no shadows\n- no realistic rendering\n- no background scenery\n- no modern editorial minimalism\n- no polished composition\n- no clean design aesthetics\n\n--------------------------------------------------\n\nKEYWORDS\n\nprimitive observational doodle\nraw ink sketch\nugly-cute\nawkward handmade drawing\nJapanese notebook marginalia\ncollapsed silhouette\nsymbolic reconstruction\ndeformed natural form\nfailed anatomy\nthick sumi ink\noverloaded brush strokes\nprimitive reduction\nbadly balanced composition\none-shot drawing\nanti-design drawing\nemotionally flat character\nvacant expression\nstrangely observant doodle\nhandmade field sketch","category":"Primitive observational doodle","date":"2026-05-21","sourceConversation":"ヤエヤマオオコウモリ落書き","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"（ここにモチーフ名を入れる）","tags":["layer_2"],"notes":"vacant/funny/failed anatomyを強めた動物・キャラクター向けマスター。\nLayer 2 style variation retained under VP-021 by 2026-06-28 pruning pass."},{"id":"VP-036","title":"[THEME] Bold black observational silhouette reduction","body":"[THEME] = <SUBJECT>\n\nCreate a bold black silhouette illustration of the theme above.\n\nThe image should look like a handmade observational sketch that has been aggressively reduced into a single black shape.\n\nIMPORTANT:\n\nDo not create a clean icon.\nDo not create a logo.\nDo not create a vector graphic.\nDo not create a realistic botanical illustration.\n\nInstead, create something between:\n\n- a memory\n- a shadow\n- a field sketch\n- a brush-painted silhouette\n\nThe subject should still be recognizable, but only barely.\n\n────────────────────────\n\nVISUAL STYLE\n\nDraw everything using pure black shapes only.\n\nWhite background.\n\nNo color.\n\nNo gray.\n\nNo shading.\n\nNo gradients.\n\nNo textures.\n\nNo realistic rendering.\n\nNo decorative details.\n\nNo outlines separate from the filled shape.\n\nThe entire drawing should feel like it was painted with a thick brush or marker.\n\n────────────────────────\n\nFORM LANGUAGE\n\nThe object should not be carefully constructed.\n\nInstead:\n\n- simplify aggressively\n- merge nearby forms together\n- lose information intentionally\n- remove small details\n- distort proportions\n- exaggerate characteristic features\n- compress visual complexity into a few large masses\n\nThe goal is not accuracy.\n\nThe goal is recognizability through reduction.\n\nLarge shapes should dominate.\n\nSmall details should disappear.\n\n────────────────────────\n\nIMPERFECTIONS\n\nPreserve accidental qualities:\n\n- uneven edges\n- awkward proportions\n- slightly broken contours\n- imperfect symmetry\n- small gaps inside shapes\n- occasional visual ambiguity\n\nThe image should feel handmade rather than designed.\n\nIt should feel discovered rather than optimized.\n\n────────────────────────\n\nOBSERVATIONAL QUALITY\n\nAlthough simplified, the drawing must still contain evidence that the artist carefully observed the real subject.\n\nAvoid generic clip-art forms.\n\nCapture only the few structural features that make the subject uniquely identifiable.\n\nEverything else should be discarded.\n\n────────────────────────\n\nCOMPOSITION\n\nSingle isolated subject.\n\nCentered composition.\n\nPlenty of empty white space around it.\n\nNo background.\n\nNo ground.\n\nNo text.\n\nNo labels.\n\nNo framing.\n\nThe result should resemble a black archaeological stencil, a remembered silhouette, or a field notebook sketch reduced to its essential visual mass.\n\n---\n\n例えば、\n\n**[THEME] = ガジュマル**\n\nにすると、あの特徴的な気根だけが異常に強調された黒い塊になる。\n\n**[THEME] = セマルハコガメ**\n\nにすると、甲羅と首だけが残った妙な黒シルエットになる。\n\n**[THEME] = 那智の滝**\n\nにすると、岩壁と一本の白抜きの滝筋だけが残る。\n\nこのスタイル、君が最近よく作っている「primitive observational doodle」とも違っていて、\n\n**\"observational silhouette reduction\"**\nあるいは\n**\"memory-shadow illustration\"**\n\nみたいな系統だと思う。かなり面白いスタイルだね。実際、地域図鑑やフィールドガイドの章扉なんかにすごく相性が良さそう。","category":"Primitive observational doodle","date":"2026-06-12","sourceConversation":"タコノキ同定","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"ガジュマル**","tags":["layer_2"],"notes":"黒一色シルエット化。doodle本流から派生した別系統。\nLayer 2 style variation retained under VP-021 by 2026-06-28 pruning pass.\nNormalized from a subject-specific silhouette version into a reusable placeholder variation."},{"id":"VP-041","title":"<SUBJECT>","body":"[THEME]\n= <SUBJECT>\n\nCreate a primitive observational ink doodle of the theme above.\n\nIMPORTANT:\n\nThe drawing must feel genuinely clumsy,\nunresolved,\nraw,\nand accidentally expressive.\n\nDo NOT make the illustration:\n\n- polished\n- balanced\n- elegant\n- refined\n- clean\n- graphically beautiful\n- commercially cute\n- professional\n- well-designed\n- vector-like\n- visually optimized\n\nThe goal is NOT artistic quality.\n\nThe goal is recognizability through childlike reconstruction.\n\n--------------------------------------------------\nCORE CONCEPT\n\nThe drawing should feel like:\n\na curious elementary school child\nobserving a real object carefully\nand trying to record it in a notebook.\n\nThe child has:\n\n- strong observational sensitivity\n- poor drawing skill\n- no design education\n- no concern for aesthetics\n\nIMPORTANT:\n\nDo NOT draw like an artist pretending to draw badly.\n\nDraw like someone who is actually bad at drawing.\n\nThe child notices important characteristics,\nbut reconstructs them incorrectly.\n\nObservation is surprisingly accurate.\n\nExecution is not.\n\n--------------------------------------------------\nOVERALL FEELING\n\nThe image should feel like:\n\n- a notebook margin doodle\n- a field observation memo\n- a school nature journal\n- a handmade local zine sketch\n- a rushed observational drawing\n- a private visual note\n- a memory aid rather than an artwork\n\nThe drawing should feel:\n\n\"surprisingly observant despite being badly drawn.\"\n\n--------------------------------------------------\nCHILDLIKE RECONSTRUCTION\n\nThe object should NOT closely follow:\n\n- realistic anatomy\n- realistic perspective\n- realistic contours\n- realistic proportions\n\nInstead:\n\n- redraw from memory-like perception\n- reconstruct forms into simple symbols\n- simplify aggressively\n- deform freely\n- collapse complexity\n- compress visual information\n- preserve only major recognizable features\n\nExamples of simplification:\n\n- leaves become ovals\n- fruits become circles\n- flowers become blobs\n- branches become sticks\n- roots become lines\n- foliage becomes floating masses\n- textures become random marks\n\nThe child often repeats simple symbols\ninstead of drawing what is actually visible.\n\n--------------------------------------------------\nSIMPLIFICATION RULE\n\nWhen uncertain:\n\nalways simplify more.\n\nAlways choose:\n\nsymbol > realism\n\nmemory > accuracy\n\nrecognition > anatomy\n\nIf a shape can become:\n\n- circle\n- oval\n- blob\n- stick\n- rectangle\n\nthen reduce it.\n\nAvoid:\n\n- sophisticated structure\n- realistic construction\n- believable anatomy\n- botanical accuracy\n- careful rendering\n\nRecognition is enough.\n\n--------------------------------------------------\nDRAWING BEHAVIOR\n\nThe drawing should feel like:\n\none attempt\n\nno planning\n\nno corrections\n\nno refinement\n\nno composition strategy\n\nno design intent\n\nThe artist simply wants to remember what they saw.\n\nThis naturally creates:\n\n- awkward proportions\n- uneven density\n- strange spacing\n- repeated symbols\n- accidental charm\n- visual mistakes\n\nPreserve these qualities.\n\n--------------------------------------------------\nLINE QUALITY\n\nUse:\n\n- bold black ink only\n- deep saturated sumi-like black\n- thick marker-like strokes\n- heavy brush pen feeling\n- dramatic thick-to-thin contrast\n- dense black areas\n- overloaded ink blobs\n- rough unstable pressure\n- trembling curves\n- uneven stroke rhythm\n- visible brush direction\n- occasional broken lines\n\nIMPORTANT:\n\nThe thick lines must feel:\n\n- confidently heavy\n- physically loaded with ink\n- blackened and dense\n- slightly excessive\n- handmade\n\nThe black areas should feel:\n\n- wet\n- physical\n- dense\n- uncontrolled\n\nAvoid:\n\n- elegant linework\n- delicate calligraphy\n- polished brushwork\n- excessive dry-brush texture\n- sophisticated ink painting aesthetics\n\nOverall impression:\n\nBLACK > TEXTURE\n\n--------------------------------------------------\nSHAPE LANGUAGE\n\nUse:\n\n- primitive symbolic reduction\n- distorted silhouettes\n- chunky masses\n- flattened perspective\n- collapsed anatomy\n- minimal information\n- awkward negative space\n- pictogram-like simplification\n\nThe drawing should feel:\n\nhalf observation\n\nhalf misunderstanding\n\n--------------------------------------------------\nCOMPOSITION\n\nUse:\n\n- isolated object\n- white background\n- off-center placement\n- awkward spacing\n- strange empty areas\n- accidental balance\n- notebook page feeling\n\nAvoid:\n\n- poster composition\n- graphic design balance\n- visual optimization\n- aesthetic symmetry\n\nRandomness is good.\n\nDiscomfort is good.\n\n--------------------------------------------------\nMOOD\n\n- emotionally dry\n- unintentionally funny\n- slightly lonely\n- quiet\n- observational\n- handmade\n- raw\n- anti-commercial\n- non-cute\n- non-anime\n\nThe drawing should feel:\n\nas if nobody expected anyone else to see it.\n\n--------------------------------------------------\nTEXT\n\nInclude small handwritten Japanese labeling text.\n\nThe handwriting should feel:\n\n- uneven\n- rushed\n- childish\n- imperfectly spaced\n- inconsistent in size\n- casually misplaced\n\nThe text should look like a child labeling a nature sketch.\n\n--------------------------------------------------\nOUTPUT STYLE\n\n- monochrome black ink on white background\n- no color\n- no gradients\n- no shadows\n- no realistic rendering\n- no background scenery\n- no decorative elements\n- no modern vector aesthetics\n- no polished editorial minimalism\n\n--------------------------------------------------\nFINAL TEST\n\nBefore finishing, verify:\n\nWould this look believable if someone said:\n\n\"An elementary school child drew this after observing the object for five minutes.\"\n\nIf the answer is no:\n\nsimplify more.\n\nDeform more.\n\nReduce more.\n\nMake it worse.\n\nKeep the observation.\n\nLose the skill.\n\n--------------------------------------------------\nKEYWORDS\n\nelementary school nature observation sketch\n\nchildlike field notebook drawing\n\nprimitive observational doodle\n\nraw ink sketch\n\nugly-cute\n\nclumsy but observant\n\nsymbolic reconstruction\n\ndeformed natural form\n\ncollapsed silhouette\n\nfailed proportions\n\none-shot drawing\n\nanti-design drawing\n\ndense black ink\n\nawkward handmade drawing\n\nJapanese notebook marginalia\n\nbadly drawn by someone with good eyes","category":"Primitive observational doodle","date":"2026-06-13","sourceConversation":"枝分かれ · 枝分かれ · グァバの落書き","duplicateCount":1,"lineageRoot":"ROOT-PRIMITIVE-DOODLE","curationStatus":"keep_variant","subject":"<SUBJECT>","tags":["layer_2"],"notes":"小学生の観察ノート的再構成を明文化した後期マスター。\nLayer 2 style variation retained under VP-021 by 2026-06-28 pruning pass."},{"id":"VP-075","title":"Create an illustration in the style of an obscure Japanese regional tourism poster printed between 1955 and 1975.","body":"Create an illustration in the style of an obscure Japanese regional tourism poster printed between 1955 and 1975.\n\nIMPORTANT:\n\nThis must NOT look like contemporary retro design.\nThis must NOT look like a modern illustrator imitating vintage graphics.\n\nInstead, it should genuinely feel like a forgotten local tourism poster produced by a small prefectural tourism office, museum, hot spring association, or national park bureau in postwar Japan.\n\nThe image should feel culturally authentic, slightly unsophisticated, and unintentionally charming.\n\n────────────────────────\n\nDRAWING PHILOSOPHY\n\nDo not draw reality.\n\nReconstruct reality from memory.\n\nThe artist observed the landscape,\nwaited several days,\nthen redrew only what remained memorable.\n\nEverything should feel remembered rather than observed.\n\nObjects are reduced to symbols.\n\nAccuracy is sacrificed for recognizability.\n\nThe goal is communication, not depiction.\n\n────────────────────────\n\nFORM LANGUAGE\n\nTransform all subjects into simplified graphic symbols.\n\nRocks become rounded blobs.\n\nMountains become stacked shapes.\n\nTrees become abstract silhouettes.\n\nBuildings become primitive blocks.\n\nPeople become tiny marks.\n\nWater becomes large flat fields.\n\nClouds become decorative cut-paper forms.\n\nAvoid realistic anatomy.\n\nAvoid realistic perspective.\n\nAvoid realistic scale relationships.\n\nObjects may become slightly creature-like or anthropomorphic.\n\nNatural forms should feel halfway between:\n\nfolk art,\nchildren's memory,\ncartography,\nand commercial signage.\n\n────────────────────────\n\nCOMPOSITION\n\nStrong poster composition.\n\nLarge empty spaces.\n\nClear visual hierarchy.\n\nDecorative arrangement.\n\nObjects placed for balance rather than realism.\n\nThe composition should feel designed by a graphic artist, not a painter.\n\nAllow strange spacing.\n\nAllow asymmetry.\n\nAllow awkward visual rhythms.\n\nAvoid cinematic composition.\n\nAvoid photography-based framing.\n\n────────────────────────\n\nCOLOR SYSTEM\n\nUse only 4–7 colors.\n\nMuted mid-century Japanese print palette.\n\nExamples:\n\nturquoise blue\nfaded vermilion\ndusty pink\nolive green\nwarm cream\ncharcoal black\nwashed indigo\n\nNo modern saturation.\n\nNo realistic colors.\n\nColors are chosen symbolically.\n\n────────────────────────\n\nPRINTING CHARACTERISTICS\n\nImitate mid-century Japanese silkscreen printing.\n\nVisible color misregistration.\n\nSlightly offset layers.\n\nSoft edge bleeding.\n\nUneven ink coverage.\n\nHalftone grain.\n\nPaper absorption.\n\nHandmade printing imperfections.\n\nTexture should feel physical.\n\nThe image should resemble an old poster found in a local museum archive.\n\n────────────────────────\n\nLINEWORK\n\nPrefer color shapes over outlines.\n\nIf outlines exist:\n\nthick,\nirregular,\nbrush-like,\nslightly unstable.\n\nNever use clean vector lines.\n\nNever use modern graphic precision.\n\n────────────────────────\n\nDESIGN REFERENCES\n\nJapanese regional tourism posters (1950s–1970s)\n\nNational park brochures\n\nLocal railway advertisements\n\nMunicipal tourism campaigns\n\nFolk craft exhibition posters\n\nChildren's educational wall charts\n\nJapanese silkscreen prints\n\nAnonymous commercial illustrators\n\nNOT famous modern graphic designers.\n\nThe feeling should be:\n\nprovincial,\nearnest,\noptimistic,\nhandmade,\nslightly awkward,\ndeeply human.\n\n────────────────────────\n\nEMOTIONAL TONE\n\nThe image should feel like:\n\na memory preserved in ink.\n\nA place described by someone who loved it more than they understood it.\n\nThe viewer should feel:\n\nnostalgia,\nwarmth,\ncuriosity,\nand trust.\n\n────────────────────────\n\nAVOID\n\nphotorealism\n\ndigital painting\n\n3D rendering\n\ncinematic lighting\n\nmodern flat design\n\nminimalist branding\n\nvector illustration\n\nperfect geometry\n\ncontemporary retro aesthetics\n\nhipster poster design\n\nadvertising polish\n\nInstagram aesthetics\n\ntourism marketing realism\n\nAI-generated perfection","category":"Japanese regional tourism poster","date":"2026-06-08","sourceConversation":"AIプロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-JP-TOURISM-POSTER","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"obscure Japanese regional tourism poster 1955-1975の中核。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-083","title":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。","body":"入力画像をもとに、モダンでフラットなベクター風イラストに変換してください。\nこれは「写真の再現」ではなく「情報の削減と再構成」を目的とします。\n【スタイル要件】\n・輪郭線は一切使用しない\n・すべての要素を色面のみで構成する\n・テクスチャ、ノイズ、細かい陰影は完全に排除する\n・グラデーションは禁止（例外的に最大2色まで）\n【形状ルール】\n・すべてのオブジェクトを幾何学的な大きな形状に再構成する\n・1オブジェクトは最大3パーツまで\n・細部や文字情報は削除または抽象化する\n・「何か分かる最低限」だけ残す\n・自然物（草、雲など）はディテールを削除し、大きなシルエットとして扱う\n【構造・パターン化ルール】\n・繰り返し要素（建築、天井、照明、電線、床、線路など）はパターンとして単純化する\n・繰り返し要素は本数・要素数を減らし、均一なリズムに再構成する\n・細かい構造は削除し、「リズム」と「配置」だけを残す\n【レイヤー構造】\n・画面を「前景・中景・後景」の3層に明確に分離する\n・各レイヤーは1〜2色のみで構成する\n・レイヤー間の明度差を大きく取り、奥行きを表現する\n【色彩ルール】\n・全体の色数は6〜8色に制限する\n・同系色の階調は最大2段階まで\n・影はぼかさず、1段階の色面で表現する\n・明度差を大きく取り、強いコントラストを作る\n・彩度はやや高めに設定する\n・地面や道路は単色または2トーンに制限する\n【主役・要素の扱い】\n・主役（人物・動物・主要オブジェクト）を最も簡潔かつ強い形で表現する\n・人物は個人の特徴ではなく、同一ルールで構成された記号として描く\n・顔のパーツは最小限（目は点または省略、鼻・口は省略可）\n・アクセントとなる要素（標識・看板など）は彩度を上げ、単純な形で強調する\n【空間・構図】\n・元画像のパースと構図は維持する\n・不要な要素は削除し、視線誘導を明確にする\n・前景の大きな形（フレームになる要素）は強調する\n・空は大きな色面として扱い、構図の主役になり得る場合は優先的に強調する\n【削減ルール（重要）】\n・要素数を意図的に削減し、最小構成で成立させる\n・「描く」のではなく「削って残す」ことを優先する\n・情報が多い場合は、意味が通る範囲で大胆に削除する\n【禁止事項】\n・リアルな再現\n・写真の質感の残存\n・細かいディテール描写\n・複雑なグラデーション\n・情報の過剰保持\n【出力】\n・ポスターとして成立するグラフィック\n・抽象度の高いフラットイラスト\n・幾何学的でクリーンな印象\nこの変換は「情報を減らしすぎているかもしれない」と感じるレベルまで削減することを許可する。","category":"Flat vector / no-outline illustration","date":"2026-05-03","sourceConversation":"イラストスタイル提案","duplicateCount":3,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"構造・レイヤー・主役・削減ルールまで含む完全版。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-085","title":"Create a highly simplified landscape illustration composed of large organic paper-cut shapes.","body":"Create a highly simplified landscape illustration composed of large organic paper-cut shapes.\n\nStyle characteristics:\n\n- flat vector illustration\n- no outlines\n- no gradients\n- no shadows\n- no perspective\n- no realism\n- no texture except subtle paper grain\n\nThe landscape should be reconstructed as layered abstract landforms rather than depicted realistically.\n\nUse:\n\n- large flowing hill shapes\n- smooth rounded contours\n- simplified symbolic objects\n- geometric reduction of nature\n\nIntegrate decorative textile-like patterns directly into some landforms:\n\n- horizontal stripes\n- repeating triangles\n- simple woven motifs\n- evenly spaced graphic patterns\n\nAll patterns should be flat and perfectly integrated into the shapes.\n\nComposition:\n\n- overlapping foreground, middle ground and background hills\n- strong asymmetrical balance\n- large areas of negative space\n- calm and contemplative atmosphere\n\nObjects should be tiny and symbolic:\na bird represented by a simple black silhouette,\na shrine gate represented by a few minimal shapes,\na waterfall represented by a single vertical strip.\n\nColor palette:\n\nmuted mustard yellow\nsage green\nwarm beige\nsoft sky blue\ndark charcoal brown\n\nColors should feel screen-printed rather than digitally rendered.\n\nAvoid:\n\nphotorealism,\n3D rendering,\nlighting effects,\ncomplex detail,\nmodern corporate illustration,\ncartoon style,\nhand lettering,\nrealistic textures.\n\nThe final image should resemble an independent Japanese travel postcard, contemporary folk-art print, or handmade screen-printed landscape poster.","category":"Flat vector / no-outline illustration","date":"2026-06-08","sourceConversation":"AI最適化プロンプト生成","duplicateCount":1,"lineageRoot":"ROOT-FLAT-VECTOR","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"organic paper-cut landscape。フラットだが別系統として保持。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-093","title":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.","body":"Create a minimalist hand-drawn conceptual diagram illustration on a clean white background.\n\nThe image should feel like a thoughtful research sketch or notebook diagram made by a designer, systems thinker, or UX researcher while developing an idea.\n\nSTYLE:\n\nsimple black ink line drawing\nslightly rough hand-drawn lines\nminimal geometric symbols\nlarge white space\nsparse composition\nquiet intellectual atmosphere\nnot polished infographic design\nnot comic style\nnot cute\nnot childish\nlooks like a conceptual whiteboard sketch\nsubtle imperfection is allowed\n\nTYPOGRAPHY:\n\nsmall neutral sans-serif English labels\nannotation-like captions\nHelvetica / Arial / Inter style\nunderstated and explanatory\n\nCOMPOSITION:\n\nfloating diagram elements\nloose spatial organization\nconnected by arrows, circles, pipes, nodes, and simple symbols\nasymmetrical layout\nlots of negative space\nconceptual rather than decorative\n\nVISUAL LANGUAGE:\n\nsimple stick-figure humans\ncircles for nodes or systems\narrows for information flow\npipes for channels\nradiating lines for dimensionality\ntiny icons for image/audio/video/text\nabstract systems-thinking diagrams\n\nThe illustration should feel like:\n\na designer’s thinking process\na philosophical systems sketch\na UX research notebook\nan unfinished but insightful conceptual map\n\nAvoid:\n\npolished corporate infographic aesthetics\nbright colors\ngradients\nthick outlines\nrealistic rendering\nexcessive decoration\noverly clean vector perfection","category":"Conceptual diagram / UX sketch","date":"2026-05-23","sourceConversation":"Minimalist Conceptual Diagram","duplicateCount":7,"lineageRoot":"ROOT-CONCEPTUAL-DIAGRAM","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"重複使用が多い安定版。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-101","title":"Reimagine the uploaded photo as the cover of a sophisticated Japanese cultural lifestyle magazine.","body":"Reimagine the uploaded photo as the cover of a sophisticated Japanese cultural lifestyle magazine.\n\nThe mood should feel intellectual, quiet, observational, and editorial rather than commercial or flashy.\n\nDo not create a typical food magazine.\nInstead, treat the image as a fragment of local culture, everyday life, and atmosphere.\n\nInspired by:\nBRUTUS, POPEYE, Casa BRUTUS, TRANSIT, Kinfolk, Apartamento.\n\nEditorial direction\n\n* Minimal and calm layout\n* Large negative space\n* Very limited headlines\n* Typography used as spatial design\n* Refined but understated\n* Quiet intellectual atmosphere\n* Observational rather than promotional\n* Avoid commercial magazine aesthetics\n* Avoid clutter\n* Avoid excessive text\n\nPhoto treatment\n\n* Warm tones\n* Slightly cinematic\n* Slight film grain\n* Soft contrast\n* Deep shadows\n* Slightly desaturated\n* Preserve realism and everyday texture\n* No HDR look\n\nTypography\n\n* Elegant Japanese typography\n* White typography preferred\n* Careful kerning and spacing\n* Vertical Japanese text elements allowed\n* Minimal typography hierarchy\n* Sophisticated editorial composition\n\nComposition\n\n* One strong focal image\n* Magazine logo placed boldly but calmly\n* Plenty of breathing room\n* Design should feel curated and intelligent\n\nThe final image should feel like a contemporary Japanese independent cultural magazine that values atmosphere, locality, and thoughtfulness.","category":"Abstract cover / banner","date":"2026-05-06","sourceConversation":"Japanese Cultural Magazine Design","duplicateCount":2,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"VP-100の短縮/再掲系。差分比較候補。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-104","title":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanes","body":"Transform the uploaded photograph into a quiet Japanese literary landscape illustration in the style of a modern Japanese book cover painting.\n\nThe result should NOT feel like a direct photo reproduction.\nInstead, reinterpret the scene through simplification, atmospheric compression, and poetic geographical abstraction.\n\nFavor abstraction over realism.\nReduce small objects into symbolic shapes and color masses.\n\nYou may freely deform, rearrange, simplify, crop, compress, or reconstruct elements of the original composition in order to create a stronger and more beautiful visual composition.\n\nFocus on:\n- geographical mood\n- layered spatial rhythm\n- quiet atmosphere\n- symbolic landforms\n- negative space\n- poetic balance between abstraction and recognizability\n\nVisual style:\n- layered aerial or semi-aerial composition\n- overlapping landforms and atmospheric depth\n- large simplified color fields\n- minimal detail\n- compressed visual information\n- muted and literary color palette\n- calm matte textures\n- subtle screenprint or gouache-like surface\n- soft print grain\n- Japanese nihonga-inspired modern landscape aesthetics\n- vintage Japanese literary cover illustration feeling\n\nColor direction:\n- muted ultramarine blues\n- deep green vegetation\n- pale sandy or concrete tones\n- hazy blue-gray distance layers\n- restrained saturation\n- minimal palette\n\nImportant:\n- No typography\n- No title text\n- No author names\n- No publisher marks\n- No UI elements\n- No photorealism\n- No cinematic lighting\n- No HDR\n- No excessive detail\n- No hard vector outlines\n- No glossy rendering\n\nThe atmosphere should feel:\nsilent,\nreflective,\nnostalgic,\ndeeply geographical,\nand emotionally tied to place memory rather than tourism imagery.\n\nStyle references:\nJapanese literary book covers,\nmodern nihonga,\nscreenprint landscapes,\nquiet aerial scenery,\nShinchosha-style cover illustration,\npoetic cartographic landscapes.\n\nSlightly uneven ink density and subtle analog print imperfections are welcome.","category":"Abstract cover / banner","date":"2026-05-12","sourceConversation":"イラストスタイル分析","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"VP-103のバリエーション。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-105","title":"Create a minimalist Japanese folk-art style editorial illustration composed of small symbolic silhouettes scattered acro","body":"Create a minimalist Japanese folk-art style editorial illustration composed of small symbolic silhouettes scattered across a textured washi-paper background.\n\nSTYLE:\n- Japanese folk craft aesthetic\n- traditional mimeograph / woodblock print feeling\n- rough hand-printed ink texture\n- imperfect black ink silhouettes\n- visible ink bleeding, scratches, fading, and distressed edges\n- asymmetric composition with large negative space\n- calm and quiet atmosphere\n- highly simplified symbolic forms\n- visual language somewhere between pictograms, stencil prints, and natural history catalog illustrations\n- no realism\n- no gradients\n- no glossy digital rendering\n- subtle randomness and imperfection\n\nPRINT / MATERIAL:\n- printed on warm natural washi paper\n- soft beige paper texture with visible fibers\n- ink looks slightly absorbed into paper\n- vintage local publication feeling\n- handcrafted editorial design\n- small independent Japanese press aesthetic\n- 1970s–1990s Japanese regional culture booklet\n\nCOMPOSITION:\n- scattered small motifs floating independently\n- generous spacing\n- asymmetrical layout\n- motifs vary slightly in size and orientation\n- strong silence and emptiness in composition\n- centered vertical Japanese typography area left empty if needed\n\nSHAPE STYLE:\n- chunky simplified silhouettes\n- primitive cutout-like forms\n- occasional accidental gaps and rough edges\n- abstracted organic geometry\n- slightly playful but restrained\n\nCOLOR:\n- only black ink on warm beige paper\n- monochrome\n- muted natural tones\n\nMOOD:\n- quiet\n- observational\n- regional\n- editorial\n- poetic\n- tactile\n- humble\n- anonymous craft feeling\n\nAvoid:\n- modern vector cleanliness\n- cute cartoon style\n- anime\n- photorealism\n- polished logo design\n- excessive decoration\n- strong symmetry\n- high contrast digital sharpness","category":"Abstract cover / banner","date":"2026-05-16","sourceConversation":"AI最適化プロンプト","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"和紙・民藝・小シルエット散布のマスター。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-109","title":"[THEME]","body":"[THEME]\n\nCreate an ultra-wide abstract cover image inspired by the theme above.\n\nIMPORTANT:\n\nDo NOT illustrate the theme literally.\n\nInstead, translate the theme into:\n\n- spatial relationships\n- emotional atmosphere\n- visual rhythm\n- density and emptiness\n- flow and tension\n- layered forms\n- color relationships\n\nSTYLE:\n\ncontemporary abstract editorial cover\nhigh-end design magazine aesthetic\nmodern art print\nminimalist abstract collage\nlarge flat organic shapes\nsoft geometric forms\noverlapping translucent layers\nquiet visual tension\ngenerous negative space\nsubtle depth\n\nVISUAL LANGUAGE:\n\nlarge irregular color fields\npaper-cut collage feeling\nfloating organic masses\nsoft-edged polygons\ntranslucent overlapping planes\noccasional fine linear gestures\nsmall scattered particle clusters\nasymmetrical composition\n\nCOMPOSITION:\n\n3000 × 1000 px\nultra-wide panoramic layout\n\nstrong horizontal movement\n\nvisual weight distributed unevenly\n\nlarge areas of calm space\n\nelements drifting across the canvas\n\nsome forms partially cropped by edges\n\navoid centered composition\n\nCOLOR:\n\nrestricted palette\n\n4–7 colors maximum\n\nmuted sophisticated tones\n\nmuseum-quality color relationships\n\navoid bright saturation\n\navoid gradients\n\nprimarily flat color surfaces\n\nTEXTURE:\n\nsubtle paper texture\n\nvery soft grain\n\nmatte finish\n\nno obvious brush strokes\n\nno realism\n\nno photographic elements\n\nNO:\n\nno people\n\nno objects\n\nno symbols\n\nno icons\n\nno typography\n\nno illustrations\n\nno recognizable scenes\n\nno landscapes\n\nno decorative patterns\n\nThe image should feel like:\n\nsomething meaningful that exists before language,\n\na thought before it becomes a concept,\n\na word that has not yet been invented,\n\na signal waiting to be interpreted.\n\nTheme: [THEME]","category":"Abstract cover / banner","date":"2026-06-24","sourceConversation":"枝分かれ · 抽象的カバー画像依頼","duplicateCount":1,"lineageRoot":"ROOT-ABSTRACT-COVER","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"抽象カバーの最新マスター。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-113","title":"Create a single uppercase Latin letter in a custom typographic style based on the following rules.","body":"Create a single uppercase Latin letter in a custom typographic style based on the following rules.\n\nSTYLE CONCEPT:\nA sculptural, humanistic sans-serif letterform that feels somewhere between:\n- carved wood signage\n- stone engraving\n- Japanese folk craft aesthetics\n- modernist architectural lettering\n- handmade editorial typography\n- quiet brutalism\n\nThe result should feel intentional and refined, NOT playful, cartoonish, or retro.\n\nIMPORTANT:\nThis is NOT a normal geometric sans-serif font.\nThe letter must feel slightly irregular, subtly hand-shaped, and constructed as a black mass d have the following characteristics:\n- Compact and rounded proportions, focusing on a cute and friendly look.\n- Soft, uneven, hand-drawn lines with noticeable variation in thickness.\n- Simple, bright colors with a slightly uneven or textured fill, avoiding sharp gradients or overly polished finishes.\n- Add one or two human characters with expressive, lighthearted facial expressions, drawn in a similarly simple and playful style.\n- The overall style should feel warm, humorous, and handmade, with minimal background detail.","category":"Assistant-authored prompt drafts","date":"2024-11-27","sourceConversation":"タクシーのイラスト分析","duplicateCount":1,"lineageRoot":"ROOT-HANDDRAWN-CUTE-VEHICLE","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"手描きタクシー風。主流系統と独立。必要なら新root化。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."},{"id":"VP-134","title":"写真に写っている要素を観察し、それぞれに対して意味のある手描き注釈を追加してください。","body":"写真に写っている要素を観察し、それぞれに対して意味のある手描き注釈を追加してください。\n\n【写ってるもの】\nここに写真内のアイテムを記入（例：アイスティー、ドーナツ）\n\n【描写ルール】\n・白ペンで描いたような細めの手描き線\n・一筆書き風でラフ、少し不均一\n・オブジェクトの外周をなぞるようにアウトラインを追加\n・矢印や点線で視線誘導をつくる\n\n【テキストルール】\n・日本語の手書き文字（ひらがな7割、やさしい漢字3割）\n・短く、独り言のようなコメントにする\n・トーンは「日記・ひとこと・感情寄り」\n\n【コメント生成ルール】\n・飲み物 → 味・温度・気分（例：すっきり、やさしい甘さ）\n・食べ物 → 食感・おいしさ（例：しっとり、最高）\n・空間 → 雰囲気（例：落ち着く、いい時間）\n・全体 → 一言まとめ（例：しあわせすぎる〜）\n\n【装飾】\n・湯気、キラキラ、ハート、小さな顔文字などを控えめに追加\n・やりすぎず「余白」を残す\n\n【仕上がり】\n・インスタのストーリー風、雑誌のラフメモ風\n・おしゃれで力の抜けた雰囲気","category":"Miscellaneous visual prompts","date":"2026-04-21","sourceConversation":"手描き注釈の雰囲気","duplicateCount":1,"lineageRoot":"ROOT-HANDWRITTEN-PHOTO-ANNOTATION","curationStatus":"keep_master","subject":"","tags":["layer_1"],"notes":"写真への手描き注釈スタイル。独立root化候補。\nLayer 1 master prompt retained by 2026-06-28 pruning pass."}],"relationships":[{"from":"ROOT-UX-STORYBOARD","to":"VP-002","type":"layer_1_master","confidence":"high","note":"Retained as a reusable master prompt for a specific image-generation style."},{"from":"VP-002","to":"VP-003","type":"layer_2_style_variati
